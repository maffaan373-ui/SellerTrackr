<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Payments | SellerTrackr</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/shared-dash.css">
<style>
.search-bar{display:flex;align-items:center;gap:.65rem;background:var(--surface);border:1.5px solid var(--border-2);border-radius:var(--r-lg);padding:.48rem .85rem;max-width:260px}
.search-bar i{width:15px;height:15px;color:var(--ink-4);flex-shrink:0}
.search-bar input{background:none;border:none;outline:none;font-size:.83rem;color:var(--ink);font-family:var(--fb);width:100%}
.filter-row{display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.filter-btn{padding:.36rem .8rem;border-radius:var(--r-full);font-size:.76rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--fb);background:var(--muted);color:var(--ink-3);border:none}
.filter-btn.active{background:var(--brand-bg);color:var(--brand)}
.filter-btn.active.amber{background:var(--amber-bg);color:var(--amber)}
.filter-btn.active.green{background:var(--green-bg);color:var(--green)}
.filter-btn.active.red{background:var(--red-bg);color:var(--red)}
.filter-btn:hover:not(.active){background:var(--ink-5);color:var(--ink)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:9000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{background:var(--surface);border-radius:var(--r-2xl);box-shadow:0 24px 64px rgba(15,23,42,.2);width:100%;max-width:400px;padding:2rem;transform:scale(.95);transition:transform .22s}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-title{font-family:var(--fd);font-size:1.25rem;font-weight:700;color:var(--ink);margin-bottom:1.25rem}
.modal-field{margin-bottom:.85rem}
.modal-field label{display:block;font-size:.72rem;font-weight:700;color:var(--ink-2);margin-bottom:.3rem}
.modal-field select,.modal-field input{width:100%;padding:.56rem .78rem;background:var(--base);border:1.5px solid var(--border-2);border-radius:var(--r-md);font-size:.83rem;font-family:var(--fb);color:var(--ink);outline:none}
.modal-field select:focus,.modal-field input:focus{border-color:var(--brand-l);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
</style>
</head>
<body>
<div class="app">
<div class="sidebar-overlay" id="sb-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" alt="">
    <span>Admin Panel</span>
    <span class="admin-chip">Admin</span>
  </div>
  <div class="sb-scroll">
    <div class="sb-section">Navigation</div>
    <a class="nav-link" href="admin-dashboard.html"><i data-lucide="layout-dashboard"></i><span>Overview</span></a>
    <a class="nav-link" href="admin-users.html"><i data-lucide="users"></i><span>Users</span></a>
    <a class="nav-link active" href="admin-payments.html"><i data-lucide="credit-card"></i><span>Payments</span></a>
    <a class="nav-link" href="admin-analytics.html"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
  </div>
  <div class="sb-footer">
    <div class="user-row" onclick="doLogout()">
      <img src="https://i.pravatar.cc/60?u=maffaan" alt="">
      <span class="user-name" id="admin-name">Admin</span>
      <i data-lucide="log-out"></i>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <button class="hamburger" id="hamburger"><i data-lucide="menu"></i></button>
    <div><div class="topbar-title">Payments</div><div class="topbar-sub">Review and approve payments</div></div>
    <div class="topbar-right">
      <span class="chip admin"><i data-lucide="shield-check" style="width:12px;height:12px"></i> Admin</span>
    </div>
  </header>

  <div class="page">
    <div class="kpi-grid mb-6" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card c-green">
        <div class="kpi-top"><div class="kpi-icon green"><i data-lucide="banknote"></i></div><div class="kpi-delta up"><i data-lucide="trending-up"></i><span>Total</span></div></div>
        <div class="kpi-val" id="k-total-rev"><div class="sk sk-v"></div></div>
        <div class="kpi-label">Total Revenue</div>
      </div>
      <div class="kpi-card c-brand">
        <div class="kpi-top"><div class="kpi-icon brand"><i data-lucide="check-circle"></i></div><div class="kpi-delta up"><i data-lucide="arrow-up"></i><span>Done</span></div></div>
        <div class="kpi-val" id="k-completed"><div class="sk sk-v"></div></div>
        <div class="kpi-label">Completed</div>
      </div>
      <div class="kpi-card c-amber">
        <div class="kpi-top"><div class="kpi-icon amber"><i data-lucide="clock"></i></div><div class="kpi-delta neutral"><i data-lucide="minus"></i><span>Pending</span></div></div>
        <div class="kpi-val" id="k-pending"><div class="sk sk-v"></div></div>
        <div class="kpi-label">Pending Review</div>
      </div>
      <div class="kpi-card c-red">
        <div class="kpi-top"><div class="kpi-icon red"><i data-lucide="x-circle"></i></div><div class="kpi-delta down"><i data-lucide="arrow-down"></i><span>Rejected</span></div></div>
        <div class="kpi-val" id="k-rejected"><div class="sk sk-v"></div></div>
        <div class="kpi-label">Rejected</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header" style="flex-wrap:wrap;gap:.75rem">
        <div><div class="card-title">All Payments</div><div class="card-sub" id="pay-count-sub">Loading…</div></div>
        <div style="display:flex;align-items:center;gap:.65rem;flex-wrap:wrap">
          <div class="filter-row">
            <button class="filter-btn active" onclick="setFilter('all',this,'')">All</button>
            <button class="filter-btn" onclick="setFilter('pending',this,'amber')">Pending</button>
            <button class="filter-btn" onclick="setFilter('completed',this,'green')">Completed</button>
            <button class="filter-btn" onclick="setFilter('rejected',this,'red')">Rejected</button>
          </div>
          <div class="search-bar">
            <i data-lucide="search"></i>
            <input type="text" placeholder="Search…" id="search-input" oninput="renderPayments()">
          </div>
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr><th>Account Name</th><th>Phone</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="pay-tbody">
            <tr><td colspan="7" style="text-align:center;color:var(--ink-4);padding:2rem">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Status modal -->
<div class="modal-overlay" id="status-modal">
  <div class="modal-box">
    <div class="modal-title">Update Payment Status</div>
    <div class="modal-field">
      <label>Payment ID</label>
      <input type="text" id="modal-pay-id" disabled style="background:var(--muted);color:var(--ink-3)">
    </div>
    <div class="modal-field">
      <label>New Status</label>
      <select id="modal-status">
        <option value="pending">Pending</option>
        <option value="completed">Completed ✓</option>
        <option value="rejected">Rejected ✗</option>
      </select>
    </div>
    <div style="display:flex;gap:.65rem;margin-top:1.25rem">
      <button class="btn brand" style="flex:1" onclick="saveStatus()">Save Status</button>
      <button class="btn ghost" style="flex:1" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="tc" id="tc-wrap"></div>
<script src="assets/js/dash-shared.js"></script>
<script>
let allPayments = [], currentFilter = 'all';

window.addEventListener('load', async () => {
  if (window.lucide) window.lucide.createIcons();
  initSidebar();
  const user = await requireAuth(true);
  if (!user) return;
  document.getElementById('admin-name').textContent = userProfile.full_name || 'Admin';
  await loadPayments();
  document.getElementById('status-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
});

async function loadPayments() {
  const { data, error } = await sb.from('payments').select('*').order('created_at', { ascending: false });
  if (error) { toast('Error: ' + error.message, 'e'); return; }
  allPayments = data || [];
  const completed = allPayments.filter(p => p.status === 'completed');
  const totalRev  = completed.reduce((a, p) => a + parseFloat(p.amount||0), 0);
  document.getElementById('k-total-rev').textContent = fmtCurrency(totalRev);
  document.getElementById('k-completed').textContent = completed.length;
  document.getElementById('k-pending').textContent   = allPayments.filter(p => p.status === 'pending').length;
  document.getElementById('k-rejected').textContent  = allPayments.filter(p => p.status === 'rejected').length;
  renderPayments();
}

function setFilter(f, btn, colorClass) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','amber','green','red'));
  btn.classList.add('active');
  if (colorClass) btn.classList.add(colorClass);
  renderPayments();
}

function renderPayments() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  let list = allPayments;
  if (currentFilter !== 'all') list = list.filter(p => p.status === currentFilter);
  if (q) list = list.filter(p =>
    (p.account_name||'').toLowerCase().includes(q) ||
    (p.phone_number||'').toLowerCase().includes(q) ||
    (p.method||'').toLowerCase().includes(q));

  document.getElementById('pay-count-sub').textContent = list.length + ' payments';
  const tb = document.getElementById('pay-tbody');
  if (list.length === 0) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--ink-4);padding:2rem">No payments found</td></tr>';
    return;
  }
  tb.innerHTML = list.map(p => `
    <tr>
      <td style="font-weight:600">${p.account_name||'—'}</td>
      <td style="font-size:.8rem;color:var(--ink-3)">${p.phone_number||'—'}</td>
      <td style="font-weight:700;color:var(--ink)">${fmtCurrency(p.amount)}</td>
      <td><span class="badge gray">${p.method||'—'}</span></td>
      <td style="font-size:.78rem;color:var(--ink-4)">${fmtDate(p.created_at)}</td>
      <td><span class="badge ${p.status==='completed'?'green':p.status==='pending'?'amber':'red'}">${p.status}</span></td>
      <td>
        <div style="display:flex;gap:.4rem">
          ${p.status==='pending' ? `
            <button class="btn success sm" onclick="quickStatus('${p.id}','completed')"><i data-lucide="check"></i>Approve</button>
            <button class="btn danger sm" onclick="quickStatus('${p.id}','rejected')"><i data-lucide="x"></i>Reject</button>
          ` : `
            <button class="btn ghost sm" onclick="openModal('${p.id}','${p.status}')"><i data-lucide="edit-2"></i>Edit</button>
          `}
        </div>
      </td>
    </tr>`).join('');
  if (window.lucide) window.lucide.createIcons();
}

async function quickStatus(id, status) {
  const { error } = await sb.from('payments').update({ status }).eq('id', id);
  if (error) { toast('Update failed', 'e'); return; }
  // If approved — upgrade user
  if (status === 'completed') {
    const pay = allPayments.find(p => p.id === id);
    if (pay?.user_id) {
      await sb.from('profiles').update({
        is_premium: true,
        premium_until: new Date(Date.now() + 30*24*60*60*1000).toISOString()
      }).eq('id', pay.user_id);
    }
    toast('Payment approved — user upgraded to Premium!', 's');
  } else {
    toast('Payment rejected', 'w');
  }
  const idx = allPayments.findIndex(p => p.id === id);
  if (idx !== -1) allPayments[idx].status = status;
  document.getElementById('k-pending').textContent   = allPayments.filter(p=>p.status==='pending').length;
  document.getElementById('k-completed').textContent = allPayments.filter(p=>p.status==='completed').length;
  document.getElementById('k-rejected').textContent  = allPayments.filter(p=>p.status==='rejected').length;
  renderPayments();
}

function openModal(id, status) {
  document.getElementById('modal-pay-id').value  = id;
  document.getElementById('modal-status').value  = status;
  document.getElementById('status-modal').classList.add('open');
  if (window.lucide) window.lucide.createIcons();
}
function closeModal() { document.getElementById('status-modal').classList.remove('open'); }

async function saveStatus() {
  const id     = document.getElementById('modal-pay-id').value;
  const status = document.getElementById('modal-status').value;
  await quickStatus(id, status);
  closeModal();
}
</script>
</body>
</html>
