<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SellerTrackr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body class="bg-slate-50">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="flex items-center gap-3 mb-10 px-2">
                <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" alt="Logo" class="w-10 h-10 rounded-lg">
                <span class="font-syne text-xl font-bold">SellerTrackr</span>
            </div>

            <nav class="flex-1 space-y-1">
                <a href="#" class="sidebar-link active">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="sidebar-link">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    <span>Sales</span>
                </a>
                <a href="#" class="sidebar-link">
                    <i data-lucide="box" class="w-5 h-5"></i>
                    <span>Products</span>
                </a>
                <a href="#" class="sidebar-link">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i>
                    <span>Reports</span>
                </a>
                <a href="#" class="sidebar-link">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="pt-6 border-t border-slate-800">
                <button id="logout-btn" class="sidebar-link w-full text-rose-400 hover:text-rose-300">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="lg:hidden p-2 bg-white rounded-lg border border-slate-200">
                        <i data-lucide="menu" class="w-6 h-6 text-slate-600"></i>
                    </button>
                    <div class="search-container">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" placeholder="Search data..." class="search-input">
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button class="relative p-2 bg-white rounded-full border border-slate-200 hover:bg-slate-50">
                        <i data-lucide="bell" class="w-5 h-5 text-slate-600"></i>
                        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></span>
                    </button>
                    
                    <div class="relative group">
                        <button class="flex items-center gap-3 p-1.5 bg-white border border-slate-200 rounded-full hover:bg-slate-50 transition-colors">
                            <img id="user-avatar" src="https://i.pravatar.cc/150?u=seller" class="w-8 h-8 rounded-full object-cover">
                            <span id="user-name" class="hidden sm:block text-sm font-semibold text-slate-700 pr-2">Loading...</span>
                        </button>
                        <!-- Simple Dropdown (Logic handled in UI.js) -->
                    </div>
                </div>
            </header>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 reveal">
                <div class="glass-card stats-card">
                    <span class="text-sm font-medium text-slate-500">Total Sales</span>
                    <div class="flex items-center justify-between">
                        <h2 id="stat-total-sales" class="text-3xl font-bold text-slate-900">0</h2>
                        <div class="p-2 bg-emerald-50 text-emerald-600 rounded-lg">
                            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
                <div class="glass-card stats-card">
                    <span class="text-sm font-medium text-slate-500">Monthly Revenue</span>
                    <div class="flex items-center justify-between">
                        <h2 id="stat-revenue" class="text-3xl font-bold text-slate-900">$0.00</h2>
                        <div class="flex flex-col items-end">
                            <span class="text-emerald-500 text-sm font-bold flex items-center gap-1">
                                <i data-lucide="trending-up" class="w-4 h-4"></i> 12.5%
                            </span>
                        </div>
                    </div>
                </div>
                <div class="glass-card stats-card">
                    <span class="text-sm font-medium text-slate-500">Active Products</span>
                    <div class="flex items-center justify-between">
                        <h2 id="stat-active-products" class="text-3xl font-bold text-slate-900">0</h2>
                        <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
                            <i data-lucide="package" class="w-6 h-6"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Body Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Chart Area -->
                <div class="lg:col-span-2 space-y-8">
                    <div class="glass-card reveal">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="font-syne font-bold text-lg">Sales Trends</h3>
                            <select class="bg-slate-50 border border-slate-200 text-sm rounded-lg px-2 py-1">
                                <option>Last 7 Days</option>
                                <option>Last 30 Days</option>
                            </select>
                        </div>
                        <div class="h-64">
                            <canvas id="salesChart"></canvas>
                        </div>
                    </div>

                    <!-- Transactions Table -->
                    <div class="glass-card reveal">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="font-syne font-bold text-lg">Recent Transactions</h3>
                            <button class="text-emerald-600 text-sm font-semibold hover:underline">View All</button>
                        </div>
                        <div class="table-container">
                            <table id="transactions-table">
                                <thead>
                                    <tr>
                                        <th>Product</th>
                                        <th>Amount</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="transactions-body">
                                    <!-- Dynamic content -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Sidebar Actions / Widgets -->
                <div class="space-y-6 reveal">
                    <div class="glass-card">
                        <h3 class="font-syne font-bold text-lg mb-4">Quick Actions</h3>
                        <div class="grid gap-3">
                            <button class="btn-primary w-full">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                                Add New Sale
                            </button>
                            <button class="btn-secondary w-full">
                                <i data-lucide="download" class="w-5 h-5"></i>
                                Export Report
                            </button>
                        </div>
                    </div>

                    <div class="glass-card bg-emerald-900 text-white border-none">
                        <div class="flex flex-col items-center text-center p-4">
                            <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mb-4">
                                <i data-lucide="zap" class="w-8 h-8 text-emerald-400"></i>
                            </div>
                            <h4 class="font-bold mb-2">Upgrade to Pro</h4>
                            <p class="text-emerald-100 text-sm mb-6">Unlock unlimited storefronts and AI analytics.</p>
                            <button class="w-full py-3 bg-emerald-500 hover:bg-emerald-400 rounded-xl font-bold transition-all">
                                Get Pro Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
