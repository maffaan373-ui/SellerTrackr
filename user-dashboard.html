<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>fluxwith — AI Canvas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>
<style>
/* ═══ RESET ═══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1c1c1c;
  --b1:#1e1e1e;--b2:#262626;--b3:#303030;
  --tx:#e2e2e2;--mu:#555;--mu2:#888;
  --gr:#22c55e;--bl:#3b82f6;--pu:#8b5cf6;--rd:#ef4444;--yl:#fbbf24;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ═══ SPLASH ═══ */
#splash{position:fixed;inset:0;z-index:9000;background:var(--bg);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.spl-mk{font-size:76px;font-weight:900;font-style:italic;color:#fff;letter-spacing:-5px;
  font-family:Georgia,serif;animation:splIn .55s cubic-bezier(.22,1,.36,1) both}
@keyframes splIn{from{opacity:0;transform:scale(.84)}to{opacity:1;transform:scale(1)}}
.spl-dots{display:flex;gap:6px}
.spl-dots span{width:4px;height:4px;border-radius:50%;animation:splDot 1.4s ease infinite}
.spl-dots span:nth-child(1){background:#222}
.spl-dots span:nth-child(2){background:#333;animation-delay:.2s}
.spl-dots span:nth-child(3){background:#444;animation-delay:.4s}
@keyframes splDot{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.7);opacity:1}}

/* ═══ MODEL POPUP ═══ */
.mpop-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:600;backdrop-filter:blur(5px)}
.mpop-bg.show{display:block}
.mpop{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid var(--b2);
  border-radius:18px 18px 0 0;z-index:601;max-height:78vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.mpop.show{transform:translateY(0)}
.mpop-handle{width:30px;height:4px;background:#222;border-radius:2px;margin:9px auto}
.mpop-title{padding:11px 16px 9px;font-size:13px;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1)}
.mpop-x{color:var(--mu);padding:4px;border-radius:6px}
.mpop-x:hover{background:var(--b1);color:#fff}
.mpop-x svg,.mpop-x svg{width:15px;height:15px;display:block}
.mpop-scroll{overflow-y:auto;flex:1}
.mpop-scroll::-webkit-scrollbar{width:2px}
.mpop-scroll::-webkit-scrollbar-thumb{background:#1e1e1e}
.msec{padding:6px 15px 3px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mu);background:var(--bg2);position:sticky;top:0}
.mrow{display:flex;align-items:center;gap:10px;padding:10px 15px;cursor:pointer;
  transition:background .12s;border-bottom:1px solid #141414}
.mrow:hover{background:#181818}
.mrow.sel{background:#0f1c33}
.mrow-ic{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;overflow:hidden}
.mrow-info{flex:1;min-width:0}
.mrow-name{font-size:12px;font-weight:600;color:#ddd}
.mrow-sub{font-size:10px;color:var(--mu);margin-top:1px}
.mbadge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:7px;flex-shrink:0}
.mb-f{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.16)}
.mb-p{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.16)}
.mb-u{background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.16)}
.mb-i{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.16)}
.ic-gpt{background:#0a1a14}.ic-gem{background:#000}.ic-cla{background:#1f100a}
.ic-ds{background:#091525}.ic-lla{background:#0a1525}.ic-mis{background:#111}.ic-qw{background:#111}

/* ═══ OVERLAY ═══ */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:70}
.ov.show{display:block}

/* ═══ SIDEBAR ═══ */
.sidebar{position:fixed;top:0;right:-290px;width:272px;height:100%;background:#0d0d0d;
  border-left:1px solid var(--b1);z-index:120;transition:right .24s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column}
.sidebar.open{right:0}
.sbt{padding:11px;overflow-y:auto;flex:1}
.sbt::-webkit-scrollbar{width:2px}
.sbt::-webkit-scrollbar-thumb{background:var(--b1)}
.sbb{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
  background:var(--bg3);border:1px solid var(--b2);border-radius:9px;
  font-size:12px;font-weight:600;color:#ccc;cursor:pointer;margin-bottom:5px;
  transition:.15s;width:100%}
.sbb:hover{background:var(--bg4);border-color:var(--b3)}
.sbb svg{width:14px;height:14px;color:var(--mu);flex-shrink:0}
.sbsec{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mu);padding:9px 12px 5px;display:flex;align-items:center;justify-content:space-between}
.sbadd{width:20px;height:20px;background:none;border:1px solid var(--b1);border-radius:5px;
  cursor:pointer;color:var(--mu);display:flex;align-items:center;justify-content:center}
.sbadd:hover{background:var(--bg3);color:#fff}
.sbadd svg{width:10px;height:10px}
.prj{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:11px;color:#666;
  cursor:pointer;transition:.13s;border-radius:7px;margin:1px 3px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.prj:hover{background:var(--bg3);color:#ccc}
.prj svg{width:10px;height:10px;color:var(--mu);flex-shrink:0}
.prj-empty{padding:7px 11px;font-size:11px;color:var(--mu);font-style:italic}
.sbbot{padding:8px;border-top:1px solid var(--b1)}
.sbup{width:100%;padding:9px;background:#0b1826;border:1px solid #1a3258;border-radius:9px;
  font-size:11px;font-weight:600;color:#60a5fa;cursor:pointer;margin-bottom:5px;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s}
.sbup:hover{background:#0f1f36}
.sbup svg{width:11px;height:11px}
.sbuser{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--bg3);
  border:1px solid var(--b1);border-radius:9px;cursor:pointer;transition:.15s;position:relative}
.sbuser:hover{background:var(--bg4)}
.av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#0ea5e9);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
  color:#fff;flex-shrink:0}
.sui{flex:1;min-width:0}
.sun{font-size:11px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sus{font-size:9px;color:var(--mu)}
.trbdg{font-size:8px;font-weight:700;padding:2px 6px;border-radius:12px;
  background:var(--gr);color:#000;flex-shrink:0}
.umenu{display:none;position:absolute;bottom:calc(100% + 6px);left:0;right:0;
  background:#1a1a1a;border:1px solid var(--b2);border-radius:11px;overflow:hidden;
  z-index:200;box-shadow:0 16px 48px rgba(0,0,0,.85)}
.umenu.show{display:block}
.umhd{padding:9px 12px;font-size:10px;color:var(--mu);border-bottom:1px solid var(--b1);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.umit{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:11px;color:#aaa;
  cursor:pointer;transition:.13s;width:100%;text-align:left}
.umit:hover{background:#222;color:#fff}
.umit svg{width:12px;height:12px;color:var(--mu);flex-shrink:0}
.umnew{background:#6366f1;color:#fff;font-size:7px;font-weight:700;padding:1px 4px;
  border-radius:10px;margin-left:auto}
.umsep{height:1px;background:var(--b1);margin:2px 0}
.umtog{margin-left:auto;width:28px;height:15px;background:#1e1e1e;border-radius:8px;
  position:relative;transition:.28s;flex-shrink:0}
.umtog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;
  background:#333;border-radius:50%;transition:.28s}
.umtog.on{background:var(--gr)}
.umtog.on::after{left:15px;background:#fff}

/* ═══ VOICE OVERLAY ═══ */
.vsc{display:none;position:fixed;inset:0;background:#040404;z-index:500;
  flex-direction:column;align-items:center;justify-content:center;gap:20px}
.vsc.show{display:flex}
.vav{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#0ea5e9);
  display:flex;align-items:center;justify-content:center;position:relative}
.vav svg{width:24px;height:24px;color:#fff}
.vr{position:absolute;border-radius:50%;border:1.5px solid rgba(14,165,233,.15);animation:vring 1.8s ease infinite}
.vr:nth-child(1){inset:-9px}
.vr:nth-child(2){inset:-20px;animation-delay:.35s}
@keyframes vring{0%{transform:scale(.9);opacity:1}100%{transform:scale(1.1);opacity:0}}
.vn{font-size:16px;font-weight:700;color:#fff}
.vs{font-size:11px;color:var(--mu)}
.vbars{display:flex;align-items:flex-end;gap:3px;height:22px}
.vbars span{width:3px;background:#0ea5e9;border-radius:2px;animation:vbar 1.2s ease infinite}
.vbars span:nth-child(2){animation-delay:.1s}.vbars span:nth-child(3){animation-delay:.2s}
.vbars span:nth-child(4){animation-delay:.3s}.vbars span:nth-child(5){animation-delay:.4s}
@keyframes vbar{0%,100%{height:3px}50%{height:18px}}
.vctrl{display:flex;gap:12px}
.vc{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.15s}
.vc svg{width:15px;height:15px}
.vc.mu3{background:#1e1e1e;color:#aaa}.vc.mu3:hover{background:#252525}
.vc.end{background:#ef4444;color:#fff}.vc.end:hover{background:#dc2626}
.vc.spk{background:#1e1e1e;color:#aaa}

/* ═══ NAV ═══ */
nav{position:fixed;top:0;left:0;right:0;z-index:60;height:48px;
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;
  background:rgba(8,8,8,.97);backdrop-filter:blur(18px);border-bottom:1px solid var(--b1)}
.nav-l{display:flex;align-items:center;gap:7px}
.logo{display:flex;align-items:center}
.logo-mk{font-size:18px;font-weight:900;color:#fff;font-style:italic;letter-spacing:-2px;
  font-family:Georgia,serif;margin-right:-1px}
.logo-nm{font-size:14px;color:#444;font-weight:300;letter-spacing:-0.3px}
.ndiv{width:1px;height:14px;background:var(--b2);margin:0 1px}
/* credits chip */
.cr{display:none;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--b1);
  border-radius:7px;padding:3px 8px;font-size:10px}
.cr.show{display:flex}
.cr-bar{width:46px;height:3px;background:var(--b1);border-radius:2px;overflow:hidden}
.cr-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);transition:width .4s}
.cr-num{color:var(--mu);font-size:10px;font-variant-numeric:tabular-nums}
.cr-upg{color:#60a5fa;font-weight:600;font-size:10px;cursor:pointer}
.cr-upg:hover{color:#93c5fd}
/* nav buttons */
.nb{display:flex;align-items:center;gap:3px;padding:4px 9px;background:var(--bg3);
  border:1px solid var(--b2);border-radius:7px;font-size:11px;font-weight:600;
  color:#555;cursor:pointer;transition:.13s;white-space:nowrap}
.nb:hover{border-color:var(--b3);color:#bbb}
.nb svg{width:11px;height:11px;flex-shrink:0}
.nb.on{background:#0f1c33;border-color:#1e3a70;color:#60a5fa}
.hbg{padding:4px;display:flex;flex-direction:column;gap:4px;cursor:pointer}
.hbg span{display:block;width:17px;height:1.5px;background:#444;border-radius:2px}

/* ═══ CANVAS ═══ */
#cvs-wrap{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;background:var(--bg);touch-action:none}
#cvs-bg{position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,#1c1c1c 1px,transparent 1px);background-size:22px 22px}
#konva-wrap{position:absolute;inset:0}
#nodes-layer{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}

/* ═══ NODE ═══ */
.ai-node{position:absolute;width:300px;background:#0e0e0e;border:1px solid var(--b2);
  border-radius:12px;overflow:visible;box-shadow:0 4px 24px rgba(0,0,0,.6);
  transition:border-color .15s,box-shadow .15s}
.ai-node:hover{border-color:var(--b3)}
.ai-node.sel{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.16),0 4px 24px rgba(0,0,0,.6)}
.ai-node.csrc{border-color:#8b5cf6;box-shadow:0 0 0 2px rgba(139,92,246,.18)}
/* header */
.nd-hd{display:flex;align-items:center;gap:6px;padding:8px 10px 7px;
  background:var(--bg3);border-bottom:1px solid var(--b1);border-radius:11px 11px 0 0;
  cursor:grab;user-select:none}
.nd-hd:active{cursor:grabbing}
.nd-grip{display:flex;flex-direction:column;gap:2px;opacity:.25;flex-shrink:0;pointer-events:none}
.nd-grip span{display:flex;gap:2px}
.nd-grip span i{display:block;width:2px;height:2px;background:#aaa;border-radius:50%}
.nd-model-btn{flex:1;min-width:0;font-size:10px;font-weight:700;color:#777;text-align:left;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
.nd-model-btn:hover{color:#ddd}
.nd-hbtn{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;transition:.13s;color:var(--mu);flex-shrink:0}
.nd-hbtn:hover{background:var(--b1);color:#ccc}
.nd-hbtn.del:hover{background:#250d0d;color:#f87171}
.nd-hbtn svg{width:10px;height:10px}
/* body */
.nd-body{padding:9px 10px}
.nd-ta{width:100%;min-height:54px;max-height:120px;background:var(--bg3);border:1px solid var(--b1);
  border-radius:7px;color:#ccc;font-size:12px;padding:7px 8px;resize:vertical;outline:none;
  line-height:1.5;transition:border-color .13s}
.nd-ta:focus{border-color:var(--b2)}
.nd-ta::placeholder{color:#222}
.nd-row{display:flex;align-items:center;gap:4px;margin-top:6px}
.nd-sel{flex:1;background:var(--bg3);border:1px solid var(--b1);border-radius:6px;
  color:#666;font-size:10px;padding:4px 6px;cursor:pointer;outline:none}
.nd-gen{display:flex;align-items:center;gap:3px;padding:5px 10px;background:#e0e0e0;
  color:#111;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:.13s}
.nd-gen:hover{background:#fff}
.nd-gen:disabled{background:#181818;color:#252525;cursor:not-allowed}
.nd-gen svg{width:9px;height:9px}
/* output */
.nd-out{margin-top:7px;font-size:11px;color:#777;line-height:1.6;white-space:pre-wrap;
  background:var(--bg);border:1px solid var(--b1);border-radius:7px;padding:7px 8px;
  display:none;max-height:190px;overflow-y:auto}
.nd-out.show{display:block}
.nd-out img{width:100%;border-radius:6px;display:block;margin-top:3px}
.nd-out.err{color:#f87171}
.nd-out::-webkit-scrollbar{width:2px}
.nd-out::-webkit-scrollbar-thumb{background:#1e1e1e}
/* connection dots */
.nd-dot{position:absolute;width:10px;height:10px;border-radius:50%;
  border:2px solid var(--bg);z-index:5;transition:.15s;cursor:crosshair}
.nd-dot:hover{transform:scale(1.5)}
.nd-dot.out{right:-5px;top:50%;margin-top:-5px;background:#3b82f6}
.nd-dot.in{left:-5px;top:50%;margin-top:-5px;background:#8b5cf6}

/* ═══ TOOLBAR ═══ */
.toolbar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:4px;background:rgba(12,12,12,.98);
  border:1px solid var(--b2);border-radius:11px;padding:5px 8px;
  backdrop-filter:blur(16px);z-index:90;box-shadow:0 6px 28px rgba(0,0,0,.55)}
.tb{display:flex;align-items:center;gap:3px;padding:5px 9px;border-radius:7px;
  font-size:10px;font-weight:600;color:#444;cursor:pointer;transition:.13s;white-space:nowrap}
.tb:hover{background:var(--bg3);color:#bbb}
.tb svg{width:11px;height:11px}
.tb.run{background:#091a0d;border:1px solid #152b1a;color:#4ade80}
.tb.run:hover{background:#0b2010;color:#86efac}
.tb.run:disabled{background:var(--bg3);border:1px solid var(--b1);color:#222;cursor:not-allowed}
.tb-sep{width:1px;height:18px;background:var(--b1)}
.tb-z{font-size:10px;font-weight:700;color:var(--mu);min-width:36px;text-align:center}

/* ═══ PANELS (templates, save, admin) ═══ */
.panel{display:none;position:fixed;top:56px;z-index:300;background:#0d0d0d;
  border:1px solid var(--b2);border-radius:12px;box-shadow:0 18px 56px rgba(0,0,0,.75);overflow:hidden}
.panel.show{display:block}
.panel-hd{display:flex;align-items:center;justify-content:space-between;
  padding:12px 15px;border-bottom:1px solid var(--b1);font-size:12px;font-weight:700;color:#fff}
.panel-x{color:var(--mu);padding:3px;border-radius:5px}
.panel-x:hover{background:var(--b1);color:#fff}
.panel-x svg{width:13px;height:13px;display:block}

/* Templates */
#tplPanel{left:50%;transform:translateX(-50%);width:min(520px,95vw)}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:11px 14px}
.tpl-card{background:var(--bg3);border:1px solid var(--b1);border-radius:9px;
  padding:11px;cursor:pointer;transition:.13s}
.tpl-card:hover{border-color:var(--b3);background:var(--bg4)}
.tpl-icon{width:26px;height:26px;border-radius:6px;background:var(--b1);
  display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.tpl-icon svg{width:13px;height:13px}
.tpl-name{font-size:11px;font-weight:700;color:#ddd;margin-bottom:2px}
.tpl-desc{font-size:10px;color:var(--mu);line-height:1.38}

/* Save panel */
#savePanel{right:12px;width:240px}
.sp-body{padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.sp-inp{width:100%;background:var(--bg3);border:1px solid var(--b1);border-radius:7px;
  color:var(--tx);font-size:11px;padding:6px 8px;outline:none}
.sp-inp:focus{border-color:var(--b2)}
.sp-btn{width:100%;padding:7px;background:#0b1826;border:1px solid #1a3258;
  border-radius:7px;color:#60a5fa;font-size:11px;font-weight:600;cursor:pointer;transition:.13s}
.sp-btn:hover{background:#0f1f36}
.sp-list{max-height:160px;overflow-y:auto;margin-top:2px}
.sp-list::-webkit-scrollbar{width:2px}
.sp-list::-webkit-scrollbar-thumb{background:var(--b1)}
.sp-item{display:flex;align-items:center;gap:6px;padding:7px 8px;background:var(--bg3);
  border:1px solid var(--b1);border-radius:7px;margin-bottom:4px;cursor:pointer;transition:.13s}
.sp-item:hover{border-color:var(--b2)}
.sp-name{font-size:11px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sp-del{color:#2a2a2a;padding:2px;border-radius:4px;flex-shrink:0}
.sp-del:hover{color:#f87171}
.sp-del svg{width:10px;height:10px;display:block}
.sp-empty{font-size:10px;color:var(--mu);font-style:italic;text-align:center;padding:9px 0}

/* ═══ ADMIN PANEL ═══ */
#adminPanel{left:50%;transform:translateX(-50%);width:min(820px,97vw);max-height:82vh;display:flex;flex-direction:column}
#adminPanel.show{display:flex}
.adm-tabs{display:flex;gap:2px;padding:8px 14px;border-bottom:1px solid var(--b1);background:var(--bg2)}
.adm-tab{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;color:var(--mu);cursor:pointer;transition:.13s}
.adm-tab:hover{background:var(--bg3);color:#ccc}
.adm-tab.on{background:var(--b1);color:#fff}

.adm-sec{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mu);margin-bottom:8px;margin-top:14px}
.adm-sec:first-child{margin-top:0}
/* stats row */
.adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.adm-stat{background:var(--bg3);border:1px solid var(--b1);border-radius:9px;padding:12px;text-align:center}
.adm-stat-val{font-size:22px;font-weight:700;color:#fff}
.adm-stat-lbl{font-size:10px;color:var(--mu);margin-top:2px}

.adm-tbl th{padding:7px 10px;text-align:left;font-size:9px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:var(--mu);border-bottom:1px solid var(--b1)}
.adm-tbl td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.025);color:#aaa}
.adm-tbl tr:hover td{background:rgba(255,255,255,.014)}
.adm-badge{display:inline-block;padding:1px 6px;border-radius:5px;font-size:9px;font-weight:700}

.adm-btn.save{background:#0b1826;border:1px solid #1a3258;color:#60a5fa}
.adm-btn.save:hover{background:#0f1f36}
.adm-btn.del{background:#1a0a0a;border:1px solid #2a1212;color:#f87171}
.adm-btn.del:hover{background:#230d0d}

.adm-input:focus{border-color:var(--b2)}

.adm-search button:hover{color:#fff;border-color:var(--b3)}

/* ═══ UPGRADE MODAL ═══ */
.upg-bg{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.75);

.upg-bg.show{display:flex}

  padding:26px 22px;max-width:320px;width:94%;text-align:center}

.upg-skip{color:var(--mu);font-size:11px;cursor:pointer}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(8px);

  font-size:11px;color:var(--tx);z-index:800;white-space:nowrap;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:#3a1111;color:#f87171;background:#1a0a0a}

/* ═══ UTILS ═══ */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}
.dp{display:flex;gap:3px;padding:2px 0}
.dp span{width:3px;height:3px;border-radius:50%;background:#333;animation:dpa 1.2s infinite}
.dp span:nth-child(2){animation-delay:.2s}
.dp span:nth-child(3){animation-delay:.4s}
@keyframes dpa{0%,100%{opacity:.2}50%{opacity:1}}

/* ═══ MOBILE ═══ */

// debounce timers
const _debounce = {};
function debounce(fn,key,ms=400){
  clearTimeout(_debounce[key]);
  _debounce[key]=setTimeout(fn,ms);
}

// AUTH — strong, no login loops
// ═══════════════════════════════════════════════════════════════
let _authInit = false;
async function initAuth(){
  if(_authInit) return;
  _authInit = true;
  try{
    const {data:{session},error} = await sb.auth.getSession();
    if(error) throw error;
    if(!session){ redirect(); return; }
    sess = session;
    sb.auth.onAuthStateChange((ev,s)=>{
      if(ev==='SIGNED_OUT'||!s){ redirect(); return; }
      if(ev==='TOKEN_REFRESHED') sess=s;
    });
    await loadProfile(session.user);
  }catch(e){
    console.error('Auth:',e.message);
    redirect();
  }
}
function redirect(){ window.location.replace('login.html'); }

async function loadProfile(u){
  const email = u.email||'';
  const meta  = u.user_metadata||{};
  const name  = meta.full_name||meta.name||email.split('@')[0]||'User';
  document.getElementById('uav').textContent    = name.slice(0,2).toUpperCase();
  document.getElementById('uname').textContent  = name;
  document.getElementById('uemail').textContent = email;

  try{
    const {data:p,error} = await sb.from('profiles')
      .select('plan,total_credits,used_credits,role,plan_expires_at')
      .eq('id',u.id).single();

    if(error?.code==='PGRST116'){
      // Profile missing — create
      await sb.from('profiles').insert({
        id:u.id,email,full_name:name,avatar_url:meta.avatar_url||null,
        plan:'free',total_credits:500,used_credits:0
      });
    } else if(p){
      // Check expiry
      if(p.plan_expires_at&&new Date(p.plan_expires_at)<new Date()&&p.plan!=='free'){
        await sb.from('profiles').update({plan:'free',total_credits:500,used_credits:0}).eq('id',u.id);
        userPlan='free'; totalCr=500; usedCr=0;
        showToast('Plan expired — downgraded to free');
      } else {
        userPlan  = p.plan||'free';
        totalCr   = p.total_credits||PLAN_CR[userPlan]||500;
        usedCr    = p.used_credits||0;
        userRole  = p.role||'user';
      }
    }
  }catch(e){ console.error('Profile:',e.message); }

  updPlanUI();
  updCrBar();
  loadSpList();

  // Show admin button if admin
  if(userRole==='admin'||email===ADMIN_EMAIL){
    userRole='admin';
    document.getElementById('adminBtn').style.display='';
  }
}

function updPlanUI(){
  const lbl = {free:'Free Plan',pro:'Pro Plan',ultimate:'Ultimate Plan',infinite:'Infinite Plan'};
  const bdg = {free:'FREE',pro:'PRO',ultimate:'ULT',infinite:'INF'};
  const el  = document.getElementById('ubadge');
  document.getElementById('uplan').textContent = lbl[userPlan]||'Free Plan';
  el.textContent = bdg[userPlan]||'FREE';
  el.style.cssText = userPlan==='pro'?'background:#1d3461;color:#60a5fa':
    userPlan==='ultimate'?'background:#2d1454;color:#c084fc':
    userPlan==='infinite'?'background:#2d1f00;color:#fbbf24':'';
}

function updCrBar(){
  document.getElementById('crChip').classList.add('show');
  const rem = Math.max(0,totalCr-usedCr);
  document.getElementById('crFill').style.width = (totalCr>0?rem/totalCr*100:0)+'%';
  document.getElementById('crNum').textContent  = rem.toLocaleString();
}

async function deductCr(cost,type='text'){
  usedCr += cost; updCrBar();
  if(!sess) return;
  try{
    const {data} = await sb.rpc('deduct_credits',{
      p_user_id:sess.user.id,p_amount:cost,p_type:type,p_desc:type+' gen'
    });
    if(data?.remaining!==undefined){ usedCr=totalCr-data.remaining; updCrBar(); }
  }catch(e){ console.error('deductCr:',e.message); }
}

function hasCr(cost){ return (totalCr-usedCr)>=cost; }
async function logout(){ await sb.auth.signOut(); redirect(); }

function initCanvas(){
  stage=new Konva.Stage({container:'konva-wrap',width:cW,height:cH});
  kLayer=new Konva.Layer();
  stage.add(kLayer);

  // Pan
  stage.on('mousedown touchstart',e=>{
    if(e.target!==stage)return;
    panning=true;
    const p=stage.getPointerPosition();
    ps={x:p.x,y:p.y};
  });
  stage.on('mousemove touchmove',e=>{
    if(!panning)return;
    const p=stage.getPointerPosition();
    tx+=p.x-ps.x; ty+=p.y-ps.y; ps={x:p.x,y:p.y};
    applyXf();
  });
  stage.on('mouseup touchend',()=>panning=false);
  stage.on('wheel',e=>{
    e.evt.preventDefault();
    const by=e.evt.deltaY<0?1.1:1/1.1;
    const os=sc; sc=Math.max(.08,Math.min(3,sc*by));
    const pt=stage.getPointerPosition();
    tx=pt.x-(pt.x-tx)*(sc/os); ty=pt.y-(pt.y-ty)*(sc/os);
    applyXf();
  });
  stage.on('click tap',e=>{
    if(e.target===stage){deselAll();if(connMode&&connSrc){connSrc=null;refreshConn();}}
  });

  // Touch pinch-zoom
  let lastDist=0;
  document.getElementById('cvs-wrap').addEventListener('touchmove',e=>{
    if(e.touches.length!==2) return;
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(lastDist>0){ const r=d/lastDist,os=sc; sc=Math.max(.08,Math.min(3,sc*r)); tx-=(cW/2)*(sc-os); ty-=(cH/2)*(sc-os); applyXf(); }
    lastDist=d;
  },{passive:false});
  document.getElementById('cvs-wrap').addEventListener('touchend',()=>lastDist=0);

  applyXf(); drawConns();
}

function applyXf(){
  stage.position({x:tx,y:ty}); stage.scale({x:sc,y:sc});
  document.getElementById('nodes-layer').style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  document.getElementById('cvs-bg').style.backgroundPosition=`${tx%22}px ${ty%22}px`;
  document.getElementById('zLbl').textContent=Math.round(sc*100)+'%';
  drawConns();
}
function zoomIn(){sc=Math.min(3,sc*1.2);applyXf();}
function zoomOut(){sc=Math.max(.08,sc/1.2);applyXf();}
function fitView(){
  if(!nodes.length){sc=1;tx=0;ty=0;applyXf();return;}
  let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
  nodes.forEach(n=>{x1=Math.min(x1,n.x);y1=Math.min(y1,n.y);x2=Math.max(x2,n.x+300);y2=Math.max(y2,n.y+280);});
  const p=60;
  sc=Math.min(1.5,Math.min(cW/(x2-x1+p*2),cH/(y2-y1+p*2)));
  tx=cW/2-(x1+x2)/2*sc; ty=cH/2-(y1+y2)/2*sc;
  applyXf();
}

// ═══════════════════════════════════════════════════════════════
function drawConns(){
  kLayer.destroyChildren();
  conns.forEach(c=>{
    const a=nodes.find(n=>n.id===c.from),b=nodes.find(n=>n.id===c.to);
    if(!a||!b) return;
    const ax=a.x+300,ay=a.y+100,bx=b.x,by=b.y+100;
    const cp=Math.min(Math.abs(bx-ax)*.55,160);
    const ar=new Konva.Arrow({points:[ax,ay,ax+cp,ay,bx-cp,by,bx,by],
      tension:.4,bezier:true,stroke:'#3b82f6',strokeWidth:1.6/sc,
      fill:'#3b82f6',pointerLength:6/sc,pointerWidth:5/sc,opacity:.6});
    ar.on('click tap',()=>{conns=conns.filter(x=>!(x.from===c.from&&x.to===c.to));drawConns();showToast('Connection removed');});
    kLayer.add(ar);
  });
  kLayer.batchDraw();
}
function clearConns(){conns=[];drawConns();showToast('Connections cleared');}

  const nd={id,
    x:o.x!==undefined?o.x:cx+(Math.random()-.5)*80,

function showOut(nid,content,mode){
  const el=document.getElementById('out-'+nid);
  if(!el) return;
  el.classList.add('show'); el.className='nd-out show';
  if(mode==='image'&&content.startsWith('http')){
    el.innerHTML=`<img src="${content}" alt="Generated" loading="lazy" onerror="this.style.display='none'"/>`;
  } else { el.textContent=content; }
}

function makeDrag(el,nd){
  const hd=document.getElementById('hd-'+nd.id);
  let dragging=false,sx=0,sy=0,ox=0,oy=0;
  const dn=e=>{
    const t=e.target;
    if(t.tagName==='BUTTON'||t.closest('.nd-hbtn')||t.tagName==='SVG'||t.tagName==='PATH'||t.tagName==='LINE'||t.tagName==='POLYLINE') return;
    dragging=true;
    sx=e.clientX||(e.touches?.[0]?.clientX||0);
    sy=e.clientY||(e.touches?.[0]?.clientY||0);
    ox=nd.x; oy=nd.y; e.preventDefault();
  };
  const mv=e=>{
    if(!dragging) return;
    const cx=e.clientX||(e.touches?.[0]?.clientX||sx);
    const cy=e.clientY||(e.touches?.[0]?.clientY||sy);
    nd.x=ox+(cx-sx)/sc; nd.y=oy+(cy-sy)/sc;
    el.style.left=nd.x+'px'; el.style.top=nd.y+'px';
    drawConns();
  };

async function callAI(messages,model){
  // Try /api/chat (Vercel serverless — key hidden)
  try{
    const r=await fetch('/api/chat',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model,messages,max_tokens:2048,user_id:sess?.user?.id,mode:'text'})
    });
    const txt=await r.text();
    if(txt.trim().startsWith('{')){
      const d=JSON.parse(txt);
      if(r.status===402) throw new Error('CREDITS_EMPTY');
      if(d.error) throw new Error(d.error);
      if(d.content) return d.content;
    }
  }catch(e){ if(e.message==='CREDITS_EMPTY') throw e; }

  // Fallback: direct OpenRouter (local dev)
  if(!OR_KEY) throw new Error('API not configured. Deploy /api/chat to Vercel with OPENROUTER_API_KEY env variable.');
  const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
    method:'POST',
    headers:{'Authorization':`Bearer ${OR_KEY}`,'Content-Type':'application/json',
      'HTTP-Referer':'https://seller-trackr-jmey.vercel.app','X-Title':'fluxwith'},
    body:JSON.stringify({model,messages,max_tokens:2048})
  });
  const txt=await r.text();
  let d; try{d=JSON.parse(txt);}catch{throw new Error('Invalid API response');}
  if(d.error) throw new Error(d.error.message||'API error');
  return d.choices?.[0]?.message?.content||'';
}

async function genNode(nodeId,injected=null){
  const nd=nodes.find(n=>n.id===nodeId);
  if(!nd||nd.generating) return;
  const ta=document.getElementById('ta-'+nodeId);
  const raw=injected||ta?.value?.trim()||'';
  if(!raw){showToast('Enter a prompt first');return;}

  const cost=nd.mode==='image'?CR_COST.image:nd.mode==='video'?CR_COST.video:CR_COST.text;
  if(!hasCr(cost)){showUpg();return;}

  nd.generating=true; nd.prompt=raw;
  const gb=document.getElementById('gen-'+nodeId);
  const ob=document.getElementById('out-'+nodeId);
  if(gb){gb.disabled=true;gb.innerHTML='<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:9px;height:9px"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';}
  if(ob){ob.classList.add('show');ob.className='nd-out show';ob.innerHTML='<div class="dp"><span></span><span></span><span></span></div>';}

  try{
    if(nd.mode==='image'){
      const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(raw)}?width=1024&height=1024&nologo=true`;
      nd.output=url; showOut(nodeId,url,'image');
      await deductCr(CR_COST.image,'image');
    } else if(nd.mode==='video'){
      // Video generation requires Infinite plan + specific model
      nd.output='Video generation is available on the Infinite plan.';
      showOut(nodeId,nd.output,'regular');
      if(ob) ob.style.color='#fbbf24';
    } else {
      const sys=nd.mode==='enhance'
        ?'You are a prompt engineer. Improve and enhance the given prompt. Return ONLY the enhanced version.'
        :null;
      const msgs=sys?[{role:'system',content:sys},{role:'user',content:raw}]:[{role:'user',content:raw}];
      const resp=await callAI(msgs,nd.model);
      nd.output=resp; showOut(nodeId,resp,'regular');
      await deductCr(CR_COST.text,'text');
    }
  }catch(e){
    nd.output='';
    if(e.message==='CREDITS_EMPTY') showUpg();
    else{ if(ob){ob.className='nd-out show err';ob.textContent='Error: '+(e.message||'Generation failed');} }
  }finally{
    nd.generating=false;
    if(gb){gb.disabled=false;gb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:9px;height:9px"><polygon points="5 3 19 12 5 21 5 3"/></svg> Generate';}
  }
  return nd.output;
}

// ═══════════════════════════════════════════════════════════════
// RUN FLOW
// ═══════════════════════════════════════════════════════════════
async function runFlow(){
  if(flowRunning) return;
  if(!nodes.length){showToast('Add nodes first');return;}
  flowRunning=true;
  const rb=document.getElementById('runBtn'),rsb=document.getElementById('runSB');
  if(rb){rb.disabled=true;rb.innerHTML='<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Running';}
  try{
    if(!conns.length){
      showToast('Running all nodes...');
      await Promise.all(nodes.map(n=>genNode(n.id)));
    } else {
      const order=topoSort();
      showToast(`Running flow (${order.length} nodes)...`);
      for(const id of order){
        const nd=nodes.find(n=>n.id===id);
        if(!nd) continue;
        const inc=conns.filter(c=>c.to===id);
        let inj=null;
        if(inc.length){
          const prev=nodes.find(n=>n.id===inc[0].from);
          if(prev?.output){
            const base=document.getElementById('ta-'+id)?.value?.trim()||'Continue from previous output';
            inj=`Context:\n${prev.output}\n\nTask: ${base}`;
          }
        }
        await genNode(id,inj);
      }
    }
    showToast('Flow complete!');
  }finally{
    flowRunning=false;
    if(rb){rb.disabled=false;rb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><polygon points="5 3 19 12 5 21 5 3"/></svg> Run Flow';}
  }
}
function topoSort(){
  const deg={},vis=new Set(),res=[];
  nodes.forEach(n=>deg[n.id]=0);
  conns.forEach(c=>deg[c.to]=(deg[c.to]||0)+1);
  const q=nodes.filter(n=>deg[n.id]===0).map(n=>n.id);
  while(q.length){
    const c=q.shift(); if(vis.has(c)) continue;
    vis.add(c); res.push(c);
    conns.filter(x=>x.from===c).forEach(x=>{deg[x.to]--;if(deg[x.to]===0)q.push(x.to);});
  }
  nodes.forEach(n=>{if(!vis.has(n.id))res.push(n.id);});
  return res;
}

  const data={nodes:nodes.map(n=>({...n,generating:false})),conns:[...conns],tx,ty,sc};

      const{error}=await sb.from('canvas_saves').insert({user_id:sess.user.id,name,data}); // JSONB — pass as object

      showToast('Saved: '+name);

async function loadCanvas(id,src){
  let state=null;
  if(src==='sb'&&sess){
    try{
      const{data}=await sb.from('canvas_saves').select('data').eq('id',id).single();
      if(data) state=typeof data.data==='string'?JSON.parse(data.data):data.data;
    }catch{}
  } else {
    const lc=JSON.parse(localStorage.getItem('fx_sv')||'[]');
    const f=lc.find(r=>r.id==id);
    if(f) state=typeof f.data==='string'?JSON.parse(f.data):f.data;
  }
  if(!state){showToast('Load failed',true);return;}
  document.getElementById('nodes-layer').innerHTML='';
  kLayer.destroyChildren();kLayer.batchDraw();
  nodes=[];conns=[];nid=0;
  tx=state.tx||0;ty=state.ty||0;sc=state.sc||1;
  (state.nodes||[]).forEach(n=>{const num=parseInt((n.id||'n0').replace('n',''));if(num>nid)nid=num;nodes.push({...n,generating:false});renderNode(nodes[nodes.length-1]);});
  conns=state.conns||[];
  applyXf();updNList();togSave();showToast('Canvas loaded');
}

async function delSave(id,src){
  if(src==='sb'&&sess){try{await sb.from('canvas_saves').delete().eq('id',id);}catch{}}
  else{const lc=JSON.parse(localStorage.getItem('fx_sv')||'[]');localStorage.setItem('fx_sv',JSON.stringify(lc.filter(r=>r.id!=id)));}
  loadSpList();showToast('Deleted');
}

  const{error}=await sb.from('profiles').update({total_credits:val,updated_at:new Date().toISOString()}).eq('id',uid);
  if(error) showToast('Error: '+error.message,true);
  else showToast('Credits updated');
}

async function admResetCr(uid){
  const{error}=await sb.from('profiles').update({used_credits:0,updated_at:new Date().toISOString()}).eq('id',uid);
  if(error) showToast('Error: '+error.message,true);
  else{ showToast('Credits reset'); admLoad('users'); }
}

async function admCanvas(body){
  const{data,error}=await sb.from('canvas_saves')
    .select('id,name,user_id,created_at,updated_at')
    .order('created_at',{ascending:false}).limit(50);
  if(error) throw error;
  body.innerHTML=`
    <table class="adm-tbl">
      <tr><th>Name</th><th>User ID</th><th>Created</th><th>Action</th></tr>
      ${(data||[]).map(c=>`
        <tr>
          <td style="color:#ddd">${c.name}</td>
          <td style="font-size:10px;color:#555">${c.user_id?.slice(0,16)}...</td>
          <td>${new Date(c.created_at).toLocaleDateString()}</td>
          <td><button class="adm-btn del" onclick="admDelCanvas('${c.id}')">Delete</button></td>
        </tr>`).join('')}
    </table>`;
}

async function admDelCanvas(id){
  const{error}=await sb.from('canvas_saves').delete().eq('id',id);
  if(error) showToast('Error: '+error.message,true);
  else{ showToast('Canvas deleted'); admLoad('canvas'); }
}

async function admCredits(body){
  const{data,error}=await sb.from('credit_transactions')
    .select('id,user_id,amount,type,description,balance_after,created_at')
    .order('created_at',{ascending:false}).limit(100);
  if(error) throw error;
  body.innerHTML=`
    <table class="adm-tbl">
      <tr><th>User</th><th>Amount</th><th>Type</th><th>Balance After</th><th>Date</th></tr>
      ${(data||[]).map(t=>`
        <tr>
          <td style="font-size:10px;color:#555">${t.user_id?.slice(0,12)}...</td>
          <td style="color:${t.amount>0?'#4ade80':'#f87171'}">${t.amount>0?'+':''}${t.amount}</td>
          <td><span style="font-size:10px;color:#888">${t.type}</span></td>
          <td>${t.balance_after?.toLocaleString()||'—'}</td>
          <td style="font-size:10px">${new Date(t.created_at).toLocaleDateString()}</td>
        </tr>`).join('')}
    </table>`;
}

function admSettings(body){
  body.innerHTML=`
    <div class="adm-sec">Global Settings</div>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:400px">
      <div>
        <div style="font-size:11px;color:#888;margin-bottom:5px">Free plan credit limit</div>
        <input class="adm-input" id="set-free-cr" value="500" type="number"/>
      </div>
      <div>
        <div style="font-size:11px;color:#888;margin-bottom:5px">Pro plan credit limit</div>
        <input class="adm-input" id="set-pro-cr" value="22000" type="number"/>
      </div>
      <div>
        <div style="font-size:11px;color:#888;margin-bottom:5px">Site announcement (shown in toast)</div>
        <input class="adm-input" id="set-msg" placeholder="e.g. We're upgrading servers tonight..."/>
      </div>
      <button class="sp-btn" style="max-width:160px" onclick="admSaveSettings()">Save Settings</button>
      <div style="font-size:10px;color:#333;margin-top:4px">Note: Credit limit changes require backend update for enforcement.</div>
    </div>
    <div class="adm-sec" style="margin-top:18px">Danger Zone</div>
    <div style="display:flex;gap:8px">
      <button class="adm-btn del" onclick="if(confirm('Clear ALL canvas saves?'))admClearAllCanvas()">Clear All Canvases</button>
    </div>`;
}

function admSaveSettings(){
  const msg=document.getElementById('set-msg')?.value?.trim();
  if(msg) showToast('Admin: '+msg);
  showToast('Settings saved (frontend only)');
}

async function admClearAllCanvas(){
  const{error}=await sb.from('canvas_saves').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if(error) showToast('Error: '+error.message,true);
  else showToast('All canvases cleared');
}

// ═══════════════════════════════════════════════════════════════
// RESIZE + KEYBOARD
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  cW=window.innerWidth; cH=window.innerHeight-48;
  if(stage){stage.width(cW);stage.height(cH);drawConns();}
});

document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT') return;
  if(e.key==='Escape'){closeSB();closeMpop();hideTpl();document.getElementById('savePanel').classList.remove('show');document.getElementById('adminPanel').classList.remove('show');if(connMode)togConn();}
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();addNode();}
  if(e.key==='Delete'&&selNode) delNode(selNode);
  if(e.key==='+'||e.key==='=') zoomIn();
  if(e.key==='-') zoomOut();
  if(e.key==='0'){sc=1;tx=0;ty=0;applyXf();}
});

  await initAuth();

  else window.addEventListener('load',initCanvas);
  setTimeout(()=>{
    const s=document.getElementById('splash');
    s.classList.add('hide');
    setTimeout(()=>s.style.display='none',500);
  },1600);
})();
</script>
