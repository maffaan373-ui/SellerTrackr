<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Users | SellerTrackr</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/shared-dash.css">
<style>
.search-bar{display:flex;align-items:center;gap:.65rem;background:var(--surface);border:1.5px solid var(--border-2);border-radius:var(--r-lg);padding:.48rem .85rem;max-width:300px}
.search-bar i{width:15px;height:15px;color:var(--ink-4);flex-shrink:0}
.search-bar input{background:none;border:none;outline:none;font-size:.83rem;color:var(--ink);font-family:var(--fb);width:100%}
.search-bar input::placeholder{color:var(--ink-4)}
.filter-row{display:flex;align-items:center;gap:.65rem;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-btn{padding:.36rem .8rem;border-radius:var(--r-full);font-size:.76rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--fb);background:var(--muted);color:var(--ink-3);border:none}
.filter-btn.active{background:var(--brand-bg);color:var(--brand)}
.filter-btn:hover:not(.active){background:var(--ink-5);color:var(--ink)}
.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--brand-bg);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:var(--brand);flex-shrink:0}
.user-cell{display:flex;align-items:center;gap:.65rem}
.toggle-wrap{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;inset:0;background:var(--border-2);border-radius:var(--r-full);cursor:pointer;transition:.3s}
.slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--brand)}
input:checked+.slider::before{transform:translateX(16px)}
.empty-msg{text-align:center;padding:3rem;color:var(--ink-4);font-size:.85rem}
</style>
</head>
<body>
<div class="app">
<div class="sidebar-overlay" id="sb-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" alt="">
    <span>Admin Panel</span>
    <span class="admin-chip">Admin</span>
  </div>
  <div class="sb-scroll">
    <div class="sb-section">Navigation</div>
    <a class="nav-link" href="admin-dashboard.html"><i data-lucide="layout-dashboard"></i><span>Overview</span></a>
    <a class="nav-link active" href="admin-users.html"><i data-lucide="users"></i><span>Users</span></a>
    <a class="nav-link" href="admin-payments.html"><i data-lucide="credit-card"></i><span>Payments</span></a>
    <a class="nav-link" href="admin-analytics.html"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
  </div>
  <div class="sb-footer">
    <div class="user-row" onclick="doLogout()">
      <img src="https://i.pravatar.cc/60?u=maffaan" alt="">
      <span class="user-name" id="admin-name">Admin</span>
      <i data-lucide="log-out"></i>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <button class="hamburger" id="hamburger"><i data-lucide="menu"></i></button>
    <div><div class="topbar-title">Users</div><div class="topbar-sub">Manage all registered users</div></div>
    <div class="topbar-right">
      <span class="chip admin"><i data-lucide="shield-check" style="width:12px;height:12px"></i> Admin</span>
    </div>
  </header>

  <div class="page">
    <div class="kpi-grid kpi-grid.c3 mb-6" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi-card c-blue">
        <div class="kpi-top"><div class="kpi-icon blue"><i data-lucide="users"></i></div><div class="kpi-delta neutral"><i data-lucide="minus"></i><span>All</span></div></div>
        <div class="kpi-val" id="k-total"><div class="sk sk-v"></div></div>
        <div class="kpi-label">Total Users</div>
      </div>
      <div class="kpi-card c-brand">
        <div class="kpi-top"><div class="kpi-icon brand"><i data-lucide="crown"></i></div><div class="kpi-delta neutral"><i data-lucide="minus"></i><span>Paid</span></div></div>
        <div class="kpi-val" id="k-premium"><div class="sk sk-v"></div></div>
        <div class="kpi-label">Premium Users</div>
      </div>
      <div class="kpi-card c-amber">
        <div class="kpi-top"><div class="kpi-icon amber"><i data-lucide="user"></i></div><div class="kpi-delta neutral"><i data-lucide="minus"></i><span>Free</span></div></div>
        <div class="kpi-val" id="k-free"><div class="sk sk-v"></div></div>
        <div class="kpi-label">Free Users</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div><div class="card-title">All Users</div><div class="card-sub" id="user-count-sub">Loading…</div></div>
        <div class="search-bar">
          <i data-lucide="search"></i>
          <input type="text" placeholder="Search users…" id="search-input" oninput="filterUsers()">
        </div>
      </div>
      <div style="padding:.75rem 1.25rem;border-bottom:1px solid var(--border)">
        <div class="filter-row" style="margin-bottom:0">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('premium',this)">Premium</button>
          <button class="filter-btn" onclick="setFilter('free',this)">Free</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>User ID</th>
              <th>Plan</th>
              <th>Sales Count</th>
              <th>Joined</th>
              <th>Premium Toggle</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="7" class="empty-msg">Loading users…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</div>
<div class="tc" id="tc-wrap"></div>
<script src="assets/js/dash-shared.js"></script>
<script>
let allUsers = [];
let currentFilter = 'all';

window.addEventListener('load', async () => {
  if (window.lucide) window.lucide.createIcons();
  initSidebar();
  const user = await requireAuth(true);
  if (!user) return;
  document.getElementById('admin-name').textContent = userProfile.full_name || 'Admin';
  await loadUsers();
});

async function loadUsers() {
  const { data, error } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
  if (error) { toast('Error loading users: ' + error.message, 'e'); return; }
  allUsers = data || [];
  document.getElementById('k-total').textContent   = allUsers.length;
  document.getElementById('k-premium').textContent = allUsers.filter(u => u.is_premium).length;
  document.getElementById('k-free').textContent    = allUsers.filter(u => !u.is_premium).length;
  renderUsers();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderUsers();
}

function filterUsers() { renderUsers(); }

function renderUsers() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let list = allUsers;
  if (currentFilter === 'premium') list = list.filter(u => u.is_premium);
  if (currentFilter === 'free')    list = list.filter(u => !u.is_premium);
  if (q) list = list.filter(u => (u.full_name||'').toLowerCase().includes(q) || (u.username||'').toLowerCase().includes(q));

  document.getElementById('user-count-sub').textContent = list.length + ' users';
  const tb = document.getElementById('users-tbody');
  if (list.length === 0) {
    tb.innerHTML = '<tr><td colspan="7" class="empty-msg">No users found</td></tr>';
    return;
  }
  tb.innerHTML = list.map(u => {
    const initials = (u.full_name||'?').split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
    return `<tr>
      <td>
        <div class="user-cell">
          <div class="avatar">${initials}</div>
          <div>
            <div style="font-weight:700;font-size:.83rem">${u.full_name||'Unknown'}</div>
            <div style="font-size:.72rem;color:var(--ink-4)">${u.username||'—'}</div>
          </div>
        </div>
      </td>
      <td style="font-size:.72rem;color:var(--ink-4);font-family:monospace">${u.id.substring(0,12)}…</td>
      <td><span class="badge ${u.is_premium?'brand':'gray'}">${u.is_premium?'Premium':'Free'}</span></td>
      <td>${u.sales_count||0}</td>
      <td>${fmtDate(u.created_at)}</td>
      <td>
        <label class="toggle-wrap">
          <input type="checkbox" ${u.is_premium?'checked':''} onchange="togglePremium('${u.id}', this.checked)">
          <span class="slider"></span>
        </label>
      </td>
      <td>
        <button class="btn danger sm" onclick="deleteUser('${u.id}','${u.full_name||'this user'}')">
          <i data-lucide="trash-2"></i>Delete
        </button>
      </td>
    </tr>`;
  }).join('');
  if (window.lucide) window.lucide.createIcons();
}

async function togglePremium(id, val) {
  const { error } = await sb.from('profiles').update({
    is_premium: val,
    premium_until: val ? new Date(Date.now() + 30*24*60*60*1000).toISOString() : null
  }).eq('id', id);
  if (error) { toast('Update failed: ' + error.message, 'e'); await loadUsers(); return; }
  const idx = allUsers.findIndex(u => u.id === id);
  if (idx !== -1) allUsers[idx].is_premium = val;
  document.getElementById('k-premium').textContent = allUsers.filter(u => u.is_premium).length;
  document.getElementById('k-free').textContent    = allUsers.filter(u => !u.is_premium).length;
  toast(val ? 'User upgraded to Premium ✓' : 'User downgraded to Free', val ? 's' : 'i');
}

async function deleteUser(id, name) {
  if (!confirm('Delete ' + name + '? This cannot be undone.')) return;
  const { error } = await sb.from('profiles').delete().eq('id', id);
  if (error) { toast('Delete failed: ' + error.message, 'e'); return; }
  allUsers = allUsers.filter(u => u.id !== id);
  document.getElementById('k-total').textContent   = allUsers.length;
  document.getElementById('k-premium').textContent = allUsers.filter(u => u.is_premium).length;
  document.getElementById('k-free').textContent    = allUsers.filter(u => !u.is_premium).length;
  renderUsers();
  toast(name + ' deleted', 'w');
}
</script>
</body>
</html>
