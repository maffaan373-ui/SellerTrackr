<style>

/* ════════════════════════════════════════
   SHARED DASHBOARD STYLES — SellerTrackr
   Used by: admin-* pages + user-* pages
════════════════════════════════════════ */
:root{
  --brand:#4338CA;--brand-d:#3730A3;--brand-l:#6366F1;--brand-bg:#EEF2FF;--brand-mid:#818CF8;
  --ink:#0F172A;--ink-2:#334155;--ink-3:#64748B;--ink-4:#94A3B8;--ink-5:#CBD5E1;
  --surface:#FFFFFF;--base:#F8F9FC;--muted:#F1F4F9;
  --border:rgba(15,23,42,.07);--border-2:rgba(15,23,42,.12);
  --green:#10B981;--green-bg:#ECFDF5;
  --amber:#F59E0B;--amber-bg:#FFFBEB;
  --red:#EF4444;--red-bg:#FEF2F2;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;--r-2xl:24px;--r-full:9999px;
  --sh-sm:0 1px 3px rgba(15,23,42,.06);
  --sh-md:0 4px 14px rgba(15,23,42,.08);
  --sh-lg:0 10px 32px rgba(15,23,42,.1);
  --sh-brand:0 4px 18px rgba(67,56,202,.28);
  --sidebar-w:240px;--topbar-h:60px;
  --fd:'Fraunces',Georgia,serif;
  --fb:'Plus Jakarta Sans',system-ui,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--fb);background:var(--base);color:var(--ink);height:100vh;}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  transition:transform .28s var(--ease);z-index:200;
}
.sb-brand{
  display:flex;align-items:center;gap:10px;
  padding:0 1.25rem;height:var(--topbar-h);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.sb-brand img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.sb-brand span{font-weight:800;font-size:.93rem;color:var(--ink);letter-spacing:-.02em}
.sb-brand .admin-chip{
  margin-left:auto;padding:2px 8px;
  background:linear-gradient(135deg,#EF4444,#F59E0B);
  color:#fff;font-size:.62rem;font-weight:800;
  border-radius:var(--r-full);text-transform:uppercase;letter-spacing:.05em;
}

.sb-scroll{flex:1;overflow-y:auto;padding:1rem 0}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}

.sb-section{
  font-size:.64rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;color:var(--ink-4);
  padding:.15rem 1.25rem .45rem;margin-top:.5rem;
}
.sb-section:first-child{margin-top:0}

.nav-link{
  display:flex;align-items:center;gap:.65rem;
  padding:.58rem 1.25rem;margin:0 .5rem;
  border-radius:var(--r-md);font-size:.84rem;font-weight:500;color:var(--ink-3);
  transition:all .16s var(--ease);cursor:pointer;
}
.nav-link i{width:17px;height:17px;flex-shrink:0}
.nav-link .nb{
  margin-left:auto;font-size:.64rem;font-weight:800;
  padding:1px 7px;border-radius:var(--r-full);
  background:var(--brand-bg);color:var(--brand);
}
.nav-link .nb.red{background:var(--red-bg);color:var(--red)}
.nav-link:hover{background:var(--muted);color:var(--ink)}
.nav-link.active{background:var(--brand-bg);color:var(--brand);font-weight:700}
.nav-link.active i{color:var(--brand)}

.sb-footer{}
.user-row{display:flex;align-items:center;gap:.6rem;padding:.4rem .25rem;cursor:pointer;border-radius:var(--r-md);transition:background .15s}
.user-row:hover{background:var(--muted)}
.user-row img{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-name{font-size:.8rem;font-weight:700;color:var(--ink);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-row i{width:15px;height:15px;color:var(--ink-4);flex-shrink:0}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:190;backdrop-filter:blur(2px)}

/* ── TOPBAR ── */
.topbar{
  height:var(--topbar-h);flex-shrink:0;
  display:flex;align-items:center;gap:.75rem;padding:0 1.5rem;
  background:var(--surface);border-bottom:1px solid var(--border);z-index:100;
}
.hamburger{
  display:none;width:34px;height:34px;border-radius:var(--r-md);
  align-items:center;justify-content:center;color:var(--ink-3);transition:background .15s;
}
.hamburger:hover{background:var(--muted)}
.hamburger i{width:18px;height:18px}

.topbar-title{font-weight:800;font-size:1rem;color:var(--ink);letter-spacing:-.02em}
.topbar-sub{font-size:.75rem;color:var(--ink-4);margin-top:.1rem}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}

.icon-btn{width:34px;height:34px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:all .15s;position:relative}
.icon-btn:hover{background:var(--muted);color:var(--ink)}
.icon-btn i{width:18px;height:18px}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--surface)}

.chip{display:inline-flex;align-items:center;gap:4px;padding:.28rem .7rem;border-radius:var(--r-full);font-size:.74rem;font-weight:700}
.chip.admin{background:linear-gradient(135deg,#FEF3C7,#FDE68A);color:#92400E}
.chip.premium{background:linear-gradient(135deg,#EDE9FE,#DDD6FE);color:var(--brand-d)}

/* ── PAGE ── */
.page{flex:1;overflow-y:auto;padding:1.5rem}
.page::-webkit-scrollbar{width:5px}
.page::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}

.page-header{margin-bottom:1.5rem}
.page-header h1{font-family:var(--fd);font-size:1.5rem;font-weight:700;color:var(--ink);letter-spacing:-.03em;line-height:1.2}
.page-header h1 em{font-style:italic;font-weight:300;color:var(--brand)}
.page-header p{font-size:.83rem;color:var(--ink-3);margin-top:.25rem}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.875rem;margin-bottom:1.5rem}
.kpi-grid.c3{grid-template-columns:repeat(3,1fr)}
.kpi-grid.c2{grid-template-columns:repeat(2,1fr)}

.kpi-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:1.1rem;
  transition:box-shadow .18s,transform .18s;position:relative;overflow:hidden;
}
.kpi-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:var(--r-xl) var(--r-xl) 0 0}
.kpi-card.c-brand::after{background:var(--brand)}
.kpi-card.c-green::after{background:var(--green)}
.kpi-card.c-amber::after{background:var(--amber)}
.kpi-card.c-red::after{background:var(--red)}
.kpi-card.c-blue::after{background:var(--blue)}

.kpi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem}
.kpi-icon{width:36px;height:36px;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon i{width:17px;height:17px}
.kpi-icon.brand{background:rgba(67,56,202,.12)}.kpi-icon.brand i{color:var(--brand)}
.kpi-icon.green{background:rgba(16,185,129,.12)}.kpi-icon.green i{color:var(--green)}
.kpi-icon.amber{background:rgba(245,158,11,.12)}.kpi-icon.amber i{color:var(--amber)}
.kpi-icon.red{background:rgba(239,68,68,.12)}.kpi-icon.red i{color:var(--red)}
.kpi-icon.blue{background:rgba(59,130,246,.12)}.kpi-icon.blue i{color:var(--blue)}

.kpi-delta{display:flex;align-items:center;gap:3px;font-size:.7rem;font-weight:700;padding:.18rem .5rem;border-radius:var(--r-full)}
.kpi-delta.up{background:var(--green-bg);color:var(--green)}
.kpi-delta.down{background:var(--red-bg);color:var(--red)}
.kpi-delta.neutral{background:var(--muted);color:var(--ink-3)}
.kpi-delta i{width:11px;height:11px}

.kpi-val{font-family:var(--fd);font-size:1.7rem;font-weight:700;color:var(--ink);line-height:1;margin-bottom:.2rem}
.kpi-label{font-size:.76rem;color:var(--ink-3);font-weight:500}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.card-title{font-size:.9rem;font-weight:700;color:var(--ink)}
.card-sub{font-size:.74rem;color:var(--ink-4);margin-top:.1rem}
.card-body{padding:1.25rem}
.card-actions{display:flex;gap:.5rem;align-items:center}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:.72rem;font-weight:700;color:var(--ink-3);
  text-transform:uppercase;letter-spacing:.06em;
  padding:.65rem 1rem;text-align:left;
  background:var(--base);border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody td{
  padding:.75rem 1rem;font-size:.83rem;color:var(--ink-2);
  border-bottom:1px solid var(--border);vertical-align:middle;
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--base)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:.22rem .65rem;border-radius:var(--r-full);font-size:.7rem;font-weight:700}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.brand{background:var(--brand-bg);color:var(--brand)}
.badge.gray{background:var(--muted);color:var(--ink-3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:.56rem 1.1rem;border:none;border-radius:var(--r-lg);font-size:.83rem;font-weight:700;font-family:var(--fb);cursor:pointer;transition:all .16s;white-space:nowrap}
.btn i{width:15px;height:15px}
.btn.brand{background:var(--brand);color:#fff;box-shadow:var(--sh-brand)}
.btn.brand:hover{background:var(--brand-d);transform:translateY(-1px)}
.btn.ghost{background:var(--muted);color:var(--ink-2)}
.btn.ghost:hover{background:var(--ink-5);color:var(--ink)}
.btn.danger{background:var(--red-bg);color:var(--red)}
.btn.danger:hover{background:var(--red);color:#fff}
.btn.success{background:var(--green-bg);color:var(--green)}
.btn.success:hover{background:var(--green);color:#fff}
.btn.sm{padding:.38rem .75rem;font-size:.76rem}
.btn.sm i{width:13px;height:13px}

/* ── CHART CARD ── */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.25rem}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:.5rem;flex-wrap:wrap}
.chart-title{font-size:.9rem;font-weight:700;color:var(--ink)}
.chart-sub{font-size:.73rem;color:var(--ink-4);margin-top:.1rem}
.chart-wrap{position:relative}

/* ── GRID HELPERS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:1.5rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem;margin-bottom:1.5rem}
.mb-4{margin-bottom:1rem}
.mb-6{margin-bottom:1.5rem}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--muted) 25%,#e8eaf0 50%,var(--muted) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r-md)}
.sk-v{height:28px;width:65%;margin-bottom:.3rem}
.sk-l{height:13px;width:50%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── TOAST ── */
.tc{position:fixed;bottom:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem;max-width:300px;width:calc(100vw - 2rem)}
.tt{display:flex;align-items:center;gap:.55rem;padding:.7rem .85rem;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-lg);box-shadow:var(--sh-lg);font-size:.8rem;font-weight:500;animation:tin .2s var(--ease)}
.tt.s{border-left:3px solid var(--green)}.tt.e{border-left:3px solid var(--red)}.tt.i{border-left:3px solid var(--brand)}.tt.w{border-left:3px solid var(--amber)}
.tt i{width:15px;height:15px;flex-shrink:0}
.tt.s i{color:var(--green)}.tt.e i{color:var(--red)}.tt.i i{color:var(--brand)}.tt.w i{color:var(--amber)}
@keyframes tin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.g2,.g3{grid-template-columns:1fr}}

@media(max-width:768px){
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .hamburger{display:flex!important}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .page{padding:1rem}
}


.nav-link .nb.brand{background:var(--brand-bg);color:var(--brand)}
.nav-link .nb.amber{background:var(--amber-bg);color:var(--amber)}

/* ── Dashboard page styles ── */
.plan-banner{display:flex;align-items:center;gap:.75rem;padding:.72rem 1rem;background:linear-gradient(135deg,var(--brand-bg),#eef4ff);border:1px solid rgba(67,56,202,.15);border-radius:var(--r-xl);margin-bottom:1.25rem}
.plan-banner i{width:17px;height:17px;color:var(--brand);flex-shrink:0}
.plan-banner-text{flex:1;font-size:.82rem;color:var(--ink-2)}.plan-banner-text strong{color:var(--brand)}
.banner-cta{padding:.36rem .82rem;background:var(--brand);color:#fff;border-radius:var(--r-full);font-size:.74rem;font-weight:700;font-family:var(--fb);cursor:pointer;border:none;transition:background .15s;white-space:nowrap}
.banner-cta:hover{background:var(--brand-d)}
.welcome-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.4rem;flex-wrap:wrap}
.welcome-text h1{font-family:var(--fd);font-size:1.55rem;font-weight:700;color:var(--ink);letter-spacing:-.03em;line-height:1.2}
.welcome-text h1 em{font-style:italic;font-weight:300;color:var(--brand)}
.welcome-text p{font-size:.82rem;color:var(--ink-3);margin-top:.2rem}
.welcome-date{font-size:.77rem;color:var(--ink-4);font-weight:500;flex-shrink:0;margin-top:.3rem}
.free-limit{display:flex;align-items:center;gap:1rem;padding:.9rem 1.1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);margin-bottom:1.25rem;flex-wrap:wrap}
.limit-info{flex:1;min-width:150px}.limit-label{font-size:.77rem;font-weight:700;color:var(--ink-2);margin-bottom:.32rem}
.limit-bar{height:7px;background:var(--muted);border-radius:var(--r-full);overflow:hidden;margin-bottom:.28rem}
.limit-fill{height:100%;border-radius:var(--r-full);background:var(--green);transition:width .6s}
.limit-fill.warn{background:var(--amber)}.limit-fill.danger{background:var(--red)}
.limit-count{font-size:.7rem;color:var(--ink-4)}
.limit-cta{padding:.38rem .82rem;background:var(--brand);color:#fff;border-radius:var(--r-full);font-size:.74rem;font-weight:700;font-family:var(--fb);cursor:pointer;border:none;transition:background .15s;white-space:nowrap}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.875rem;margin-bottom:1.4rem}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.1rem;transition:box-shadow .18s,transform .18s;position:relative;overflow:hidden}
.kpi-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.kpi-card::after{content:"";position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:var(--r-xl) var(--r-xl) 0 0}
.kpi-card.c-brand::after{background:var(--brand)}.kpi-card.c-green::after{background:var(--green)}.kpi-card.c-amber::after{background:var(--amber)}.kpi-card.c-blue::after{background:var(--blue)}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.7rem}
.kpi-icon{width:34px;height:34px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon i{width:16px;height:16px}
.kpi-icon.brand{background:rgba(67,56,202,.12)}.kpi-icon.brand i{color:var(--brand)}
.kpi-icon.green{background:rgba(16,185,129,.12)}.kpi-icon.green i{color:var(--green)}
.kpi-icon.amber{background:rgba(245,158,11,.12)}.kpi-icon.amber i{color:var(--amber)}
.kpi-icon.blue{background:rgba(59,130,246,.12)}.kpi-icon.blue i{color:var(--blue)}
.kpi-delta{display:flex;align-items:center;gap:2px;font-size:.69rem;font-weight:700;padding:.16rem .48rem;border-radius:var(--r-full)}

  const {data:p}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  userProfile=p||{};
  // Admin check: by is_admin flag OR by hardcoded admin email
  const isAdmin=userProfile.is_admin===true||currentUser.email==='maffaan373@gmail.com';
  if(!isAdmin){window.location.href='login.html';return null;}
  return currentUser;
}

async function doLogout(){await sb?.auth.signOut();window.location.href='admin-login.html';}

function toast(msg,type){
  const ic={s:'check-circle',e:'x-circle',i:'info',w:'alert-triangle'};
  const c=document.getElementById('tc-wrap');if(!c)return;
  const el=document.createElement('div');
  el.className='tt '+(type||'i');
  el.innerHTML='<i data-lucide="'+(ic[type]||'info')+'"></i><span style="flex:1">'+msg+'</span>';
  c.appendChild(el);
  if(window.lucide)window.lucide.createIcons();
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .22s';setTimeout(()=>el.remove(),240);},3800);
}

function initSidebar(){
  const h=document.getElementById('hamburger');
  const s=document.getElementById('sidebar');
  const o=document.getElementById('sb-overlay');
  if(h)h.addEventListener('click',()=>{s?.classList.toggle('open');o?.classList.toggle('open');});
  if(o)o.addEventListener('click',()=>{s?.classList.remove('open');o?.classList.remove('open');});
}

function fmtCurrency(n){return '₨'+Number(n||0).toLocaleString('en-PK',{maximumFractionDigits:0});}
function fmtDate(s){return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtTime(s){return new Date(s).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}

function getLast6(){
  const r=[],n=new Date();
  for(let i=5;i>=0;i--){const d=new Date(n.getFullYear(),n.getMonth()-i,1);r.push({y:d.getFullYear(),m:d.getMonth(),l:d.toLocaleString('default',{month:'short'})});}
  return r;
}
function getLast12(){
  const r=[],n=new Date();
  for(let i=11;i>=0;i--){const d=new Date(n.getFullYear(),n.getMonth()-i,1);r.push({y:d.getFullYear(),m:d.getMonth(),l:d.toLocaleString('default',{month:'short'})});}
  return r;
}

async function adminInit(onReady){
  if(window.lucide)window.lucide.createIcons();
  initSidebar();
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const user=await requireAuth();
  if(!user)return;
  const n=document.getElementById('admin-name');if(n)n.textContent=userProfile.full_name||'Admin';
  if(typeof onReady==='function')await onReady();
  if(window.lucide)window.lucide.createIcons();
}

let allUsers=[],cf="all";
window.addEventListener("load",()=>adminInit(loadUsers));
async function loadUsers(){
  const {data,error}=await sb.from("profiles").select("*").order("created_at",{ascending:false});
  if(error){toast("Error: "+error.message,"e");return;}
  allUsers=data||[];
  document.getElementById("k-total").textContent=allUsers.length;
  document.getElementById("k-premium").textContent=allUsers.filter(u=>u.is_premium).length;
  document.getElementById("k-free").textContent=allUsers.filter(u=>!u.is_premium).length;
  document.getElementById("users-nb").textContent=allUsers.length;
  renderUsers();
}
function setF(f,btn){cf=f;document.querySelectorAll(".fp").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderUsers();}
function renderUsers(){
  const q=(document.getElementById("srch-inp").value||"").toLowerCase();
  let list=cf==="all"?allUsers:cf==="premium"?allUsers.filter(u=>u.is_premium):allUsers.filter(u=>!u.is_premium);
  if(q)list=list.filter(u=>(u.full_name||"").toLowerCase().includes(q)||(u.username||"").toLowerCase().includes(q));
  document.getElementById("u-sub").textContent=list.length+" users";
  const tb=document.getElementById("users-tbody");
  if(!list.length){tb.innerHTML="<tr><td colspan='7' style='text-align:center;color:var(--ink-4);padding:2.5rem'>No users found</td></tr>";return;}
  tb.innerHTML=list.map(u=>{
    const init=(u.full_name||"?").split(" ").map(n=>n[0]).join("").substring(0,2).toUpperCase();
    return "<tr>"
    +"<td><div class='ucell'><div class='av'>"+init+"</div><div><div style='font-weight:700;font-size:.83rem'>"+(u.full_name||"Unknown")+"</div><div style='font-size:.71rem;color:var(--ink-4)'>"+(u.username||"—")+"</div></div></div></td>"
    +"<td style='font-size:.78rem;color:var(--ink-3)'>"+(u.email||"—")+"</td>"
    +"<td><span class='badge "+(u.is_premium?"brand":"gray")+"'>"+(u.is_premium?"Premium":"Free")+"</span></td>"
    +"<td style='font-weight:600'>"+(u.sales_count||0)+"</td>"
    +"<td style='color:var(--ink-4);font-size:.79rem'>"+fmtDate(u.created_at)+"</td>"
    +"<td><label class='tog'><input type='checkbox' "+(u.is_premium?"checked":"")+" onchange='togglePremium(\""+u.id+"\",this.checked)'><span class='tog-sl'></span></label></td>"
    +"<td><button class='btn danger sm' onclick='deleteUser(\""+u.id+"\",\""+( u.full_name||"this user")+"\")'><i data-lucide='trash-2'></i>Delete</button></td>"
    +"</tr>";
  }).join("");
  if(window.lucide)window.lucide.createIcons();
}
async function togglePremium(id,val){
  const {error}=await sb.from("profiles").update({is_premium:val,premium_until:val?new Date(Date.now()+30*24*60*60*1000).toISOString():null}).eq("id",id);
  if(error){toast("Update failed: "+error.message,"e");await loadUsers();return;}
  const idx=allUsers.findIndex(u=>u.id===id);if(idx!==-1)allUsers[idx].is_premium=val;
  document.getElementById("k-premium").textContent=allUsers.filter(u=>u.is_premium).length;
  document.getElementById("k-free").textContent=allUsers.filter(u=>!u.is_premium).length;
  toast(val?"Upgraded to Premium ✓":"Downgraded to Free",val?"s":"i");
}
async function deleteUser(id,name){
  if(!confirm("Delete "+name+"? This cannot be undone."))return;
  const {error}=await sb.from("profiles").delete().eq("id",id);
  if(error){toast("Delete failed: "+error.message,"e");return;}
  allUsers=allUsers.filter(u=>u.id!==id);
  document.getElementById("k-total").textContent=allUsers.length;
  document.getElementById("k-premium").textContent=allUsers.filter(u=>u.is_premium).length;
  document.getElementById("k-free").textContent=allUsers.filter(u=>!u.is_premium).length;
  renderUsers();toast(name+" deleted","w");
}

let adminNotifData = {pending:0, newFeedback:0};

function updateAdminBell(pending, newFb) {
  adminNotifData = {pending, newFeedback: newFb};
  const dot = document.getElementById('bell-dot');
  if(dot) dot.style.display = (pending>0||newFb>0) ? 'block' : 'none';
}

function toggleAdminBell(e) {
  e.stopPropagation();
  const p = document.getElementById('notif-panel');
  p.classList.toggle('open');
  if(p.classList.contains('open')) renderAdminNotifs();
}

document.addEventListener('click', () => {
  const p = document.getElementById('notif-panel');
  if(p) p.classList.remove('open');
});

function renderAdminNotifs() {
  const list = document.getElementById('notif-list');
  const notifs = [];
  if(adminNotifData.pending > 0) {
    notifs.push({icon:'credit-card',cls:'red',text:`<strong>${adminNotifData.pending}</strong> payment${adminNotifData.pending>1?'s':''} awaiting approval`,time:'Tap to review'});
  }
  if(adminNotifData.newFeedback > 0) {
    notifs.push({icon:'message-square',cls:'amber',text:`<strong>${adminNotifData.newFeedback}</strong> new support message${adminNotifData.newFeedback>1?'s':''}`,time:'From users'});
  }
  notifs.push({icon:'shield-check',cls:'brand',text:'Admin panel is <strong>active</strong>',time:'SellerTrackr'});
  if(!notifs.length) { list.innerHTML='<div class="notif-empty">No alerts</div>'; return; }
  list.innerHTML = notifs.map(n =>
    `<div class="notif-item">
      <div class="ni-icon ${n.cls}"><i data-lucide="${n.icon}"></i></div>
      <div><div class="ni-text">${n.text}</div><div class="ni-time">${n.time}</div></div>
    </div>`
  ).join('');
  if(window.lucide) window.lucide.createIcons();
}

function clearAdminNotifs() {
  document.getElementById('bell-dot').style.display = 'none';
  document.getElementById('notif-list').innerHTML = '<div class="notif-empty">All cleared</div>';
}

<script>
// ══ HAMBURGER + SETTINGS — runs after DOM ready ══
window.addEventListener('load', function() {
  var sidebar  = document.getElementById('sidebar');
  var overlay  = document.getElementById('sb-overlay');
  var hamburger= document.getElementById('hamburger');
  var settBtn  = document.getElementById('settings-btn');
  var popup    = document.getElementById('settings-popup');

  function openSidebar()  { sidebar.classList.add('open');    overlay.classList.add('open'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

  if (hamburger) {
    hamburger.addEventListener('click', function(e) {
      e.stopPropagation();
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
  }
  if (overlay) overlay.addEventListener('click', closeSidebar);

  // Close sidebar when a nav link is clicked on mobile
  if (sidebar) {
    sidebar.querySelectorAll('.nav-link').forEach(function(a) {
      a.addEventListener('click', function() {
        if (window.innerWidth <= 768) closeSidebar();
      });
    });
  }

  // Settings popup toggle
  if (settBtn && popup) {
    settBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var isOpen = popup.style.display === 'block';
      popup.style.display = isOpen ? 'none' : 'block';
    });
    document.addEventListener('click', function() {
      if (popup) popup.style.display = 'none';
    });
    popup.addEventListener('click', function(e) { e.stopPropagation(); });
  }

  // Logout fallback
  window._sbLogout = function() {
    if (window.sb) {
      sb.auth.signOut().then(function() { window.location.href = 'admin-login.html'; });
    } else {
      window.location.href = 'admin-login.html';
    }
  };
});
</script>
