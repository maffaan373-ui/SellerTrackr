<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SellerTrackr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" 
                     alt="Logo" 
                     class="w-12 h-12 rounded-xl">
                <span class="font-display text-2xl font-bold text-white">SellerTrackr</span>
            </a>
            <h1 class="text-3xl font-display font-bold text-white mb-2">Create Account</h1>
            <p class="text-white/60">Join 10,000+ sellers worldwide</p>
        </div>

        <div class="glass-card p-8">
            <button id="google-signup-btn" class="w-full flex items-center justify-center gap-3 p-4 bg-white/5 border border-white/10 rounded-xl font-semibold text-white hover:bg-white/10 transition-all mb-6">
                <img src="https://www.google.com/favicon.ico" class="w-6 h-6" alt="Google">
                Continue with Google
            </button>

            <div class="relative mb-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 text-white/40 bg-primary-light uppercase text-xs font-bold">Or with email</span>
                </div>
            </div>

            <form id="signup-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-white/90 mb-2">Full Name</label>
                    <input id="fullname" type="text" required placeholder="John Doe" 
                           class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white">
                </div>

                <div>
                    <label class="block text-sm font-bold text-white/90 mb-2">Username</label>
                    <input id="username" type="text" required placeholder="johndoe_123" 
                           class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white">
                </div>

                <div>
                    <label class="block text-sm font-bold text-white/90 mb-2">Email</label>
                    <input id="email" type="email" required placeholder="name@company.com" 
                           class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white">
                </div>

                <div>
                    <label class="block text-sm font-bold text-white/90 mb-2">Password</label>
                    <input id="password" type="password" required placeholder="••••••••" 
                           class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white">
                    <p class="text-xs text-white/50 mt-2">Kam se kam 8 characters</p>
                </div>

                <div class="flex items-start gap-3 py-2">
                    <input type="checkbox" id="terms" required class="w-5 h-5 accent-accent rounded mt-0.5">
                    <label for="terms" class="text-sm text-white/70">
                        I agree to the Terms and Privacy Policy
                    </label>
                </div>

                <button type="submit" id="submit-btn" class="w-full btn-primary py-4 text-lg">
                    Create Account
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <p class="mt-8 text-center text-white/60">
                Already have account? 
                <a href="login.html" class="text-accent font-bold hover:underline">Log in</a>
            </p>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module">
        import { signupUser, loginWithGoogle } from './assets/js/auth.js';
        import { showToast } from './assets/js/ui.js';
        
        // Initialize Lucide
        if (window.lucide) window.lucide.createIcons();

        // Form submission
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Creating account...';
            
            try {
                const fullName = document.getElementById('fullname').value;
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                console.log('Form data:', { fullName, username, email });
                
                await signupUser(email, password, { 
                    full_name: fullName, 
                    username: username 
                });
            } catch (error) {
                console.error('Signup error:', error);
                showToast('Error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create Account <i data-lucide="arrow-right" class="w-5 h-5"></i>';
                if (window.lucide) window.lucide.createIcons();
            }
        });

        // Google signup
        document.getElementById('google-signup-btn').addEventListener('click', async () => {
            await loginWithGoogle();
        });
    </script>
</body>
</html>
