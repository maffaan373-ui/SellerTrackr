<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up — Fluxwith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:15px;-webkit-font-smoothing:antialiased}
    body{font-family:'Inter',sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;flex-direction:column}
    *{-webkit-tap-highlight-color:transparent}
    .nav{height:58px;display:flex;align-items:center;padding:0 20px;justify-content:space-between;border-bottom:1px solid #e5e5e5}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .nav-logo img{width:28px;height:28px;border-radius:7px;object-fit:cover}
    .nav-logo span{font-size:16px;font-weight:600;color:#111}
    .nav-link{font-size:14px;color:#6b6b6b;text-decoration:none}
    .nav-link:hover{color:#111}
    .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 60px}
    .card{width:100%;max-width:380px}
    .card-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:28px;font-weight:400;color:#111;margin-bottom:6px;letter-spacing:-0.3px}
    .card-sub{font-size:14px;color:#6b6b6b;margin-bottom:28px;line-height:1.5}
    .banner{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
    .banner.error{background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7;display:block}
    .banner.success{background:#f0fff4;color:#276749;border:1px solid #c6f6d5;display:block}
    .form{display:flex;flex-direction:column;gap:14px}
    .field{display:flex;flex-direction:column;gap:5px}
    .field label{font-size:13px;font-weight:500;color:#111}
    .field input{width:100%;padding:13px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;font-family:'Inter',sans-serif;color:#111;background:#fff;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
    .field input::placeholder{color:#bbb}
    .field input:focus{border-color:#111}
    .field input.error{border-color:#e53e3e}
    .err-msg{font-size:12px;color:#e53e3e;display:none;margin-top:2px}
    .err-msg.show{display:block}
    .strength-bar{height:3px;border-radius:2px;background:#e5e5e5;margin-top:6px;overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;width:0%;transition:width 0.3s,background 0.3s}
    .strength-label{font-size:11px;color:#bbb;margin-top:4px}
    .btn-submit{width:100%;padding:15px;border-radius:50px;font-size:16px;font-weight:600;color:#fff;background:#111;border:none;cursor:pointer;margin-top:4px;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-submit:hover{opacity:0.82}
    .btn-submit:disabled{opacity:0.4;cursor:not-allowed}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading .spinner{display:block}
    .loading .btn-text{display:none}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#bbb;font-size:12px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e5e5}
    .btn-oauth{width:100%;padding:13px;border-radius:50px;border:1.5px solid #e5e5e5;font-size:15px;font-weight:400;color:#111;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color 0.15s}
    .btn-oauth:hover{border-color:#999}
    .note{text-align:center;margin-top:24px;font-size:13px;color:#6b6b6b}
    .note a{color:#111;font-weight:500;text-decoration:underline}
  </style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="https://i.ibb.co/Ndsqgj9y/IMG-20260305-022118.png" alt="Fluxwith"/>
    <span>Fluxwith</span>
  </a>
  <a href="login.html" class="nav-link">Sign in</a>
</nav>
<main class="main">
  <div class="card">
    <h1 class="card-title">Create account</h1>
    <p class="card-sub">Start fluxing — it's free.</p>
    <div class="banner" id="banner"></div>
    <form class="form" id="signup-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
        <span class="err-msg" id="email-err">Enter a valid email address.</span>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
        <div class="strength-bar"><div class="strength-fill" id="sf"></div></div>
        <span class="strength-label" id="sl"></span>
        <span class="err-msg" id="pass-err">Password must be at least 8 characters.</span>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password"/>
        <span class="err-msg" id="conf-err">Passwords do not match.</span>
      </div>
      <button type="submit" class="btn-submit" id="sub-btn">
        <span class="btn-text">Continue</span>
        <span class="spinner"></span>
      </button>
    </form>
    <div class="divider">or</div>
    <button class="btn-oauth" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <p class="note">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</main>
<script>
// ── SUPABASE CONFIG — apni keys yahan lagao ──
const SUPABASE_URL  = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_KEY_HERE';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// Password strength
const pInp = document.getElementById('password');
pInp.addEventListener('input', () => {
  const v = pInp.value, sf = document.getElementById('sf'), sl = document.getElementById('sl');
  let s = 0;
  if(v.length>=8) s++; if(v.length>=12) s++; if(/[A-Z]/.test(v)) s++;
  if(/[0-9]/.test(v)) s++; if(/[^A-Za-z0-9]/.test(v)) s++;
  sf.style.width=['0%','20%','40%','60%','80%','100%'][s]||'0%';
  sf.style.background=['','#e53e3e','#dd6b20','#d69e2e','#38a169','#22543d'][s]||'';
  sl.textContent=v.length?['','Weak','Fair','Good','Strong','Very strong'][s]:'';
});

// Signup
document.getElementById('signup-form').addEventListener('submit', async e => {
  e.preventDefault();
  let ok = true;
  const banner  = document.getElementById('banner');
  const btn     = document.getElementById('sub-btn');
  const emailEl = document.getElementById('email');
  const passEl  = document.getElementById('password');
  const confEl  = document.getElementById('confirm');
  banner.className = 'banner';

  const ev = emailEl.value.trim();
  const eok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(ev);
  document.getElementById('email-err').classList.toggle('show',!eok);
  emailEl.classList.toggle('error',!eok);
  if(!eok) ok=false;

  const pv = passEl.value;
  const pok = pv.length>=8;
  document.getElementById('pass-err').classList.toggle('show',!pok);
  passEl.classList.toggle('error',!pok);
  if(!pok) ok=false;

  const cok = confEl.value===pv && pv.length>0;
  document.getElementById('conf-err').classList.toggle('show',!cok);
  confEl.classList.toggle('error',!cok);
  if(!cok) ok=false;

  if(!ok) return;

  btn.classList.add('loading'); btn.disabled=true;

  const { error } = await sb.auth.signUp({ email: ev, password: pv });

  btn.classList.remove('loading'); btn.disabled=false;

  if(error){
    banner.textContent = error.message;
    banner.className   = 'banner error';
    return;
  }

  sessionStorage.setItem('signup_email', ev);
  window.location.href = 'otp.html';
});

// Google OAuth
document.getElementById('google-btn').addEventListener('click', async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options:  { redirectTo: window.location.origin + '/user-dashboard.html' }
  });
  if(error){
    const b=document.getElementById('banner');
    b.textContent=error.message; b.className='banner error';
  }
});
</script>
</body>
</html>
