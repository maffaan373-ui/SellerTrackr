<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SellerTrackr</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <a href="index.html" class="auth-logo">
            <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" alt="Logo">
            <span>SellerTrackr</span>
        </a>
        <h1 class="auth-heading">Create your account</h1>
        <p class="auth-sub">Join 10,000+ sellers worldwide</p>

        <div class="auth-card">
            <button id="google-signup-btn" class="btn-google">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Continue with Google
            </button>

            <div class="auth-divider">or with email</div>

            <form id="signup-form" style="display:flex;flex-direction:column;gap:var(--space-4)">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
                    <div class="form-group">
                        <label class="form-label" for="fullname">Full Name</label>
                        <input id="fullname" type="text" required placeholder="John Doe" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input id="username" type="text" required placeholder="johndoe" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" type="email" required placeholder="name@company.com" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" type="password" required placeholder="Min. 8 characters" class="form-input">
                </div>
                <div style="display:flex;align-items:flex-start;gap:8px">
                    <input type="checkbox" id="terms" required style="width:16px;height:16px;accent-color:var(--brand-700);margin-top:2px;flex-shrink:0">
                    <label for="terms" style="font-size:0.83rem;color:var(--text-secondary)">I agree to the <a href="#" style="color:var(--brand-700)">Terms</a> and <a href="#" style="color:var(--brand-700)">Privacy Policy</a></label>
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary btn-lg btn-full">
                    Create Account
                    <i data-lucide="arrow-right" style="width:18px;height:18px"></i>
                </button>
            </form>
        </div>

        <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script type="module">
    import { signupUser, loginWithGoogle } from './assets/js/auth.js';
    import { showToast } from './assets/js/ui.js';
    if (window.lucide) window.lucide.createIcons();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.textContent = 'Creating account…';
        try {
            await signupUser(
                document.getElementById('email').value,
                document.getElementById('password').value,
                { full_name: document.getElementById('fullname').value, username: document.getElementById('username').value }
            );
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Create Account <i data-lucide="arrow-right" style="width:18px;height:18px"></i>';
            if (window.lucide) window.lucide.createIcons();
        }
    });
    document.getElementById('google-signup-btn').addEventListener('click', () => loginWithGoogle());
</script>
</body>
</html>
