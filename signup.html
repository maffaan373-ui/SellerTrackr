<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign up — fluxwith</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:Inter,sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px}
*{-webkit-tap-highlight-color:transparent}
.card{width:100%;max-width:360px}
.logo{display:inline-flex;align-items:center;gap:0;text-decoration:none;margin-bottom:36px}
.logo svg{margin-right:-1px;display:block;flex-shrink:0}
.logo span{font-size:17px;font-weight:500;color:#111;letter-spacing:-0.4px}
.title{font-family:"Instrument Serif",Georgia,serif;font-style:italic;font-size:26px;font-weight:400;color:#111;margin-bottom:6px;letter-spacing:-0.3px}
.sub{font-size:14px;color:#6b6b6b;margin-bottom:26px;line-height:1.5}
.banner{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.banner.error{background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7;display:block}
.banner.ok{background:#f0fff4;color:#276749;border:1px solid #c6f6d5;display:block}
.form{display:flex;flex-direction:column;gap:13px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:13px;font-weight:500;color:#111}
.field input{width:100%;padding:13px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;color:#111;background:#fff;outline:none;transition:border-color .15s;-webkit-appearance:none;font-family:Inter,sans-serif}
.field input::placeholder{color:#bbb}
.field input:focus{border-color:#111}
.field input.err{border-color:#e53e3e}
.emsg{font-size:12px;color:#e53e3e;display:none;margin-top:2px}
.emsg.show{display:block}
.sbar{height:3px;border-radius:2px;background:#e5e5e5;margin-top:6px;overflow:hidden}
.sfill{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s}
.slbl{font-size:11px;color:#bbb;margin-top:4px}
.btn{width:100%;padding:14px;border-radius:50px;font-size:15px;font-weight:600;color:#fff;background:#111;border:none;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;font-family:Inter,sans-serif}
.btn:hover{opacity:.82}
.btn:disabled{opacity:.4;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .spinner{display:block}
.loading .btn-text{display:none}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:#bbb;font-size:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#e5e5e5}
.btn-o{width:100%;padding:13px;border-radius:50px;border:1.5px solid #e5e5e5;font-size:15px;color:#111;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .15s;font-family:Inter,sans-serif}
.btn-o:hover{border-color:#999}
.note{text-align:center;margin-top:20px;font-size:13px;color:#6b6b6b}
.note a{color:#111;font-weight:500;text-decoration:underline}
</style></head><body>
<div class="card">
  <a href="index.html" class="logo">
    <svg width="26" height="19" viewBox="0 0 70 50" xmlns="http://www.w3.org/2000/svg"><text x="0" y="44" font-family="Georgia,serif" font-size="52" font-weight="900" font-style="italic" fill="#111" letter-spacing="-4">fl.</text></svg>
    <span>fluxwith</span>
  </a>
  <h1 class="title">Create account</h1>
  <p class="sub">Start fluxing — it's free.</p>
  <div class="banner" id="banner"></div>
  <form class="form" id="form" novalidate>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      <span class="emsg" id="eem">Valid email daalo.</span>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="Min. 8 characters" autocomplete="new-password"/>
      <div class="sbar"><div class="sfill" id="sf"></div></div>
      <span class="slbl" id="sl"></span>
      <span class="emsg" id="pem">Password 8 characters se kam hai.</span>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="conf" placeholder="Re-enter password" autocomplete="new-password"/>
      <span class="emsg" id="cem">Passwords match nahi kar rahe.</span>
    </div>
    <button type="submit" class="btn" id="btn">
      <span class="btn-text">Continue</span><span class="spinner"></span>
    </button>
  </form>
  <div class="divider">or</div>
  <button class="btn-o" id="gbtn">
    <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
  <p class="note">Already have an account? <a href="login.html">Sign in</a></p>
</div>
<script>
const SURL='https://dpxuopdoumomasmahnyo.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRweHVvcGRvdW1vbWFzbWFobnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTE5NjUsImV4cCI6MjA4Nzg4Nzk2NX0.MxsfAZqhjp2M-yi8LVgOpTJEhSLujYTGJdivSM_VpcQ';
const sb=supabase.createClient(SURL,SKEY);

// Agar pehle se logged in hai to dashboard pe bhejo
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.replace('user-dashboard.html');
});

// Password strength
const pInp=document.getElementById('pass');
pInp.addEventListener('input',()=>{
  const v=pInp.value,sf=document.getElementById('sf'),sl=document.getElementById('sl');
  let s=0;
  if(v.length>=8)s++;if(v.length>=12)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  sf.style.width=['0%','20%','40%','60%','80%','100%'][s];
  sf.style.background=['','#e53e3e','#dd6b20','#d69e2e','#38a169','#22543d'][s]||'';
  sl.textContent=v?['','Weak','Fair','Good','Strong','Very strong'][s]:'';
});

document.getElementById('form').addEventListener('submit',async e=>{
  e.preventDefault();
  let ok=true;
  const banner=document.getElementById('banner');
  const btn=document.getElementById('btn');
  banner.className='banner';
  const ev=document.getElementById('email').value.trim();
  const pv=document.getElementById('pass').value;
  const cv=document.getElementById('conf').value;
  const eok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(ev);
  document.getElementById('eem').classList.toggle('show',!eok);
  document.getElementById('email').classList.toggle('err',!eok);
  if(!eok)ok=false;
  const pok=pv.length>=8;
  document.getElementById('pem').classList.toggle('show',!pok);
  document.getElementById('pass').classList.toggle('err',!pok);
  if(!pok)ok=false;
  const cok=cv===pv&&pv.length>0;
  document.getElementById('cem').classList.toggle('show',!cok);
  document.getElementById('conf').classList.toggle('err',!cok);
  if(!cok)ok=false;
  if(!ok)return;

  btn.classList.add('loading');btn.disabled=true;

  // Supabase signUp — email confirm ON hai to OTP email aayega
  const{data,error}=await sb.auth.signUp({
    email:ev,
    password:pv,
    options:{
      emailRedirectTo: window.location.origin+'/user-dashboard.html',
      data:{ email: ev }
    }
  });

  btn.classList.remove('loading');btn.disabled=false;

  if(error){
    // "User already registered" — login page pe bhejo
    if(error.message.toLowerCase().includes('already')){
      banner.textContent='Ye email pehle se registered hai. Sign in karo.';
      banner.className='banner error';
      setTimeout(()=>window.location.href='login.html',2000);
      return;
    }
    banner.textContent=error.message;
    banner.className='banner error';
    return;
  }

  // Agar user session mil gaya (email confirm off) — seedha dashboard
  if(data.session){
    window.location.href='user-dashboard.html';
    return;
  }

  // Email confirm ON hai — OTP page
  sessionStorage.setItem('signup_email',ev);
  window.location.href='otp.html';
});

// Google OAuth — Supabase dashboard mein Google provider enable karo
// Authentication > Providers > Google
document.getElementById('gbtn').addEventListener('click',async()=>{
  const{error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{
      redirectTo: window.location.origin+'/user-dashboard.html',
      queryParams:{ access_type:'offline', prompt:'consent' }
    }
  });
  if(error){
    const b=document.getElementById('banner');
    b.textContent='Google sign in error: '+error.message;
    b.className='banner error';
  }
});
</script>
</body></html>
