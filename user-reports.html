<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — SellerTrackr</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/shared-dash.css">
<style>
.page-h{font-family:var(--fd);font-size:1.55rem;font-weight:700;color:var(--ink);letter-spacing:-.03em;line-height:1.2;margin-bottom:.18rem}
.page-h em{font-style:italic;font-weight:300;color:var(--brand)}
.page-sub{font-size:.82rem;color:var(--ink-3);margin-bottom:1.4rem}
.filter-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-btn{padding:.36rem .8rem;border-radius:var(--r-full);font-size:.76rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--fb);background:var(--muted);color:var(--ink-3);border:none}
.filter-btn.active{background:var(--brand-bg);color:var(--brand)}.filter-btn:hover:not(.active){background:var(--ink-5);color:var(--ink)}
.search-row{display:flex;align-items:center;gap:.65rem;background:var(--surface);border:1.5px solid var(--border-2);border-radius:var(--r-lg);padding:.46rem .82rem;max-width:280px}
.search-row i{width:14px;height:14px;color:var(--ink-4);flex-shrink:0}
.search-row input{background:none;border:none;outline:none;font-size:.82rem;color:var(--ink);font-family:var(--fb);width:100%}
.search-row input::placeholder{color:var(--ink-4)}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;flex-wrap:wrap;gap:.65rem}
.add-sale-btn{display:flex;align-items:center;gap:5px;padding:.5rem .95rem;background:var(--brand);color:#fff;border:none;border-radius:var(--r-lg);font-size:.82rem;font-weight:700;font-family:var(--fb);cursor:pointer;box-shadow:var(--sh-brand);transition:all .16s}
.add-sale-btn:hover{background:var(--brand-d);transform:translateY(-1px)}
.add-sale-btn i{width:14px;height:14px}
.tbl-summary{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--ink-3)}
.tbl-summary strong{color:var(--ink);font-weight:700}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.completed{background:var(--green)}.status-dot.pending{background:var(--amber)}.status-dot.refunded{background:var(--red)}
.action-row{display:flex;align-items:center;gap:.35rem}
/* Add sale modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:9000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{background:var(--surface);border-radius:var(--r-2xl);box-shadow:0 24px 64px rgba(15,23,42,.2);width:100%;max-width:400px;padding:1.75rem;transform:scale(.95) translateY(8px);transition:transform .24s}
.modal-overlay.open .modal-box{transform:scale(1) translateY(0)}
.modal-title{font-family:var(--fd);font-size:1.25rem;font-weight:700;color:var(--ink);margin-bottom:1.25rem}
.mfield{margin-bottom:.82rem}
.mfield label{display:block;font-size:.72rem;font-weight:700;color:var(--ink-2);margin-bottom:.28rem}
.mfield input,.mfield select{width:100%;padding:.56rem .78rem;background:var(--base);border:1.5px solid var(--border-2);border-radius:var(--r-md);font-size:.83rem;font-family:var(--fb);color:var(--ink);outline:none}
.mfield input:focus,.mfield select:focus{border-color:var(--brand-l);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.modal-btns{display:flex;gap:.5rem;margin-top:1.25rem}
.btn-save{flex:1;padding:.68rem;background:var(--brand);color:#fff;border:none;border-radius:var(--r-lg);font-size:.86rem;font-weight:700;font-family:var(--fb);cursor:pointer;transition:background .16s}
.btn-save:hover{background:var(--brand-d)}
.btn-cancel{flex:1;padding:.68rem;background:none;border:1.5px solid var(--border-2);border-radius:var(--r-lg);font-size:.86rem;font-weight:600;font-family:var(--fb);cursor:pointer;color:var(--ink-3);transition:all .16s}
.btn-cancel:hover{background:var(--muted)}
</style>
</head>
<body>
<div class="app">
<div class="sidebar-overlay" id="sb-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" alt=""><span>SellerTrackr</span></div>
  <div class="sb-scroll">
    <div class="sb-section">Main</div>
    <a class="nav-link" href="user-dashboard.html"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
    <a class="nav-link" href="user-analytics.html"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a>
    <a class="nav-link active" href="user-reports.html"><i data-lucide="file-text"></i><span>Reports</span></a>
    <div class="sb-section">Account</div>
    <a class="nav-link" href="user-pricing.html"><i data-lucide="zap"></i><span>Pricing</span></a>
    <a class="nav-link" href="user-settings.html"><i data-lucide="settings"></i><span>Settings</span></a>
    <a class="nav-link" href="user-support.html"><i data-lucide="life-buoy"></i><span>Support</span></a>
  </div>
  <div class="sb-footer">
    <div class="user-row" id="logout-row"><img src="https://i.pravatar.cc/60?u=user" alt="" id="user-avatar"><span class="user-name" id="sidebar-user-name">Loading…</span><i data-lucide="log-out"></i></div>
  </div>
</aside>
<div class="main">
  <header class="topbar">
    <button class="hamburger" id="hamburger"><i data-lucide="menu"></i></button>
    <div><div class="topbar-title">Reports</div><div class="topbar-sub">Sales history & records</div></div>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="openAddModal()"><i data-lucide="plus" style="width:13px;height:13px"></i>Add Sale</button>
    </div>
  </header>
  <div class="page">
    <div class="page-h">Sales <em>Reports</em></div>
    <div class="page-sub">All your sales records. Add, manage, and track every transaction.</div>

    <div class="top-bar">
      <div class="filter-row" style="margin-bottom:0">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('completed',this)">Completed</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('refunded',this)">Refunded</button>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
        <div class="search-row"><i data-lucide="search"></i><input type="text" placeholder="Search sales…" id="search-input" oninput="renderSales()"></div>
        <button class="add-sale-btn" onclick="openAddModal()"><i data-lucide="plus"></i>Add Sale</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div><div class="card-title">All Sales</div><div class="card-sub tbl-summary" id="tbl-summary">Loading…</div></div>
        <button class="btn ghost sm" onclick="exportCSV()"><i data-lucide="download"></i>Export CSV</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Product</th><th>Storefront</th><th>Channel</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
          <tbody id="sales-tbody"><tr><td colspan="7" style="text-align:center;padding:2.5rem;color:var(--ink-4)">Loading sales…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Add Sale Modal -->
<div class="modal-overlay" id="add-modal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-title">Add New Sale</div>
    <div class="mfield"><label>Product Name *</label><input id="m-product" type="text" placeholder="e.g. UI Kit Pro"></div>
    <div class="mfield"><label>Amount (₨) *</label><input id="m-amount" type="number" placeholder="e.g. 4500" min="0" step="1"></div>
    <div class="mfield"><label>Storefront</label><input id="m-storefront" type="text" placeholder="e.g. Main Store"></div>
    <div class="mfield"><label>Channel</label>
      <select id="m-channel"><option value="Direct">Direct</option><option value="Social">Social</option><option value="Marketplace">Marketplace</option><option value="Referral">Referral</option><option value="Other">Other</option></select>
    </div>
    <div class="mfield"><label>Status</label>
      <select id="m-status"><option value="completed">Completed</option><option value="pending">Pending</option><option value="refunded">Refunded</option></select>
    </div>
    <div class="mfield"><label>Sale Date</label><input id="m-date" type="date"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save" onclick="saveSale()">Save Sale</button>
    </div>
  </div>
</div>

<div class="tc" id="tc-wrap"></div>
<script src="assets/js/dash-shared.js"></script>
<script>
let allSales=[],currentFilter='all';
window.addEventListener('load',async()=>{
  if(window.lucide)window.lucide.createIcons();
  initSidebar();
  document.getElementById('logout-row').addEventListener('click',doLogout);
  const user=await requireAuth(false);if(!user)return;
  document.getElementById('sidebar-user-name').textContent=userProfile.full_name||currentUser.email?.split('@')[0]||'User';
  document.getElementById('m-date').value=new Date().toISOString().split('T')[0];
  await loadSales();
  if(window.lucide)window.lucide.createIcons();
});
async function loadSales(){
  const{data,error}=await sb.from('sales').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
  if(error){toast('Error: '+error.message,'e');return;}
  allSales=data||[];renderSales();
}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderSales();}
function renderSales(){
  const q=document.getElementById('search-input').value.toLowerCase();
  let list=currentFilter==='all'?allSales:allSales.filter(s=>s.status===currentFilter);
  if(q)list=list.filter(s=>(s.product_name||'').toLowerCase().includes(q)||(s.storefront||'').toLowerCase().includes(q));
  document.getElementById('tbl-summary').innerHTML=`<strong>${list.length}</strong> records · Total: <strong>${fmtCurrency(list.reduce((a,s)=>a+parseFloat(s.amount||0),0))}</strong>`;
  const tb=document.getElementById('sales-tbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:2.5rem;color:var(--ink-4)">No sales found. Add your first sale!</td></tr>';return;}
  tb.innerHTML=list.map(s=>`<tr>
    <td><div style="font-weight:600;font-size:.83rem">${s.product_name||'—'}</div></td>
    <td><span style="font-size:.8rem">${s.storefront||'Default'}</span></td>
    <td><span class="badge gray" style="font-size:.72rem">${s.channel||'Direct'}</span></td>
    <td><span style="font-weight:700;color:var(--green);font-size:.84rem">${fmtCurrency(s.amount)}</span></td>
    <td><div style="display:flex;align-items:center;gap:.35rem"><span class="status-dot ${s.status||'completed'}"></span><span class="badge ${s.status==='completed'?'green':s.status==='pending'?'amber':'red'}" style="font-size:.72rem">${s.status||'completed'}</span></div></td>
    <td style="font-size:.79rem;color:var(--ink-3)">${fmtDate(s.created_at)}</td>
    <td><div class="action-row"><button class="btn danger sm" onclick="deleteSale('${s.id}')"><i data-lucide="trash-2"></i></button></div></td>
  </tr>`).join('');
  if(window.lucide)window.lucide.createIcons();
}
function openAddModal(){document.getElementById('add-modal').classList.add('open');if(window.lucide)window.lucide.createIcons();}
function closeAddModal(){document.getElementById('add-modal').classList.remove('open');}
async function saveSale(){
  const product=document.getElementById('m-product').value.trim();
  const amount=parseFloat(document.getElementById('m-amount').value);
  const storefront=document.getElementById('m-storefront').value.trim()||'Default';
  const channel=document.getElementById('m-channel').value;
  const status=document.getElementById('m-status').value;
  const saleDate=document.getElementById('m-date').value;
  if(!product){toast('Product name required','w');return;}
  if(isNaN(amount)||amount<=0){toast('Valid amount required','w');return;}
  const{error}=await sb.from('sales').insert({user_id:currentUser.id,product_name:product,amount,storefront,channel,status,sale_date:saleDate,created_at:new Date().toISOString()});
  if(error){toast('Error: '+error.message,'e');return;}
  toast('Sale added!','s');closeAddModal();
  document.getElementById('m-product').value='';document.getElementById('m-amount').value='';document.getElementById('m-storefront').value='';
  await loadSales();
}
async function deleteSale(id){
  if(!confirm('Delete this sale?'))return;
  const{error}=await sb.from('sales').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'e');return;}
  allSales=allSales.filter(s=>s.id!==id);renderSales();toast('Sale deleted','i');
}
function exportCSV(){
  if(!allSales.length){toast('No sales to export','w');return;}
  const headers=['Product','Storefront','Channel','Amount','Status','Date'];
  const rows=allSales.map(s=>[s.product_name||'',s.storefront||'',s.channel||'',s.amount||0,s.status||'',fmtDate(s.created_at)].join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sellertrackr-sales.csv';a.click();
  toast('CSV exported!','s');
}
</script>
</body>
</html>
