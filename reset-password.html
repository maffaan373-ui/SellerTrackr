<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | SellerTrackr</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#4338CA;--brand-d:#3730A3;--brand-l:#6366F1;--brand-bg:#EEF2FF;
  --ink:#0F172A;--ink-2:#334155;--ink-3:#64748B;--ink-4:#94A3B8;
  --surface:#fff;--base:#F8F9FC;--muted:#F1F4F9;--border:rgba(15,23,42,.09);--border-2:rgba(15,23,42,.15);
  --green:#10B981;--amber:#F59E0B;--red:#EF4444;
  --r-md:10px;--r-lg:14px;--r-xl:20px;--r-2xl:28px;--r-full:9999px;
  --sh-lg:0 12px 36px rgba(15,23,42,.1);--sh-brand:0 6px 24px rgba(67,56,202,.3);
  --ease:cubic-bezier(.4,0,.2,1);--ease-out:cubic-bezier(0,0,.2,1);
  --font-d:'Fraunces',Georgia,serif;--font-b:'Plus Jakarta Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font-b);background:var(--base);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:1.5rem}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.card{background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-2xl);box-shadow:var(--sh-lg);padding:2.5rem;width:100%;max-width:420px}

.card-logo{display:flex;align-items:center;gap:8px;margin-bottom:2rem}
.card-logo img{width:28px;height:28px;border-radius:6px}
.card-logo span{font-weight:800;font-size:.95rem;color:var(--ink);letter-spacing:-.02em}

.card-icon{width:52px;height:52px;background:var(--brand-bg);border-radius:var(--r-xl);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.card-icon i{width:24px;height:24px;color:var(--brand)}

h1{font-family:var(--font-d);font-size:1.75rem;font-weight:700;color:var(--ink);letter-spacing:-.03em;margin-bottom:.4rem}
.sub{font-size:.875rem;color:var(--ink-3);margin-bottom:1.75rem;line-height:1.55}

.field{margin-bottom:1rem}
.field label{display:block;font-size:.78rem;font-weight:700;color:var(--ink-2);margin-bottom:.4rem}
.field-pw{position:relative}
.field-pw input{width:100%;padding:.68rem .875rem;padding-right:2.75rem;background:var(--base);border:1.5px solid var(--border-2);border-radius:var(--r-md);color:var(--ink);font-size:.875rem;font-family:inherit;transition:border-color .15s,box-shadow .15s,background .15s}
.field-pw input::placeholder{color:var(--ink-4)}
.field-pw input:focus{outline:none;border-color:var(--brand-l);box-shadow:0 0 0 3px rgba(99,102,241,.15);background:var(--surface)}
.field.has-err .field-pw input{border-color:var(--red)}
.field .err-msg{font-size:.72rem;color:var(--red);margin-top:.3rem;display:none}
.field.has-err .err-msg{display:block}
.pw-eye{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);color:var(--ink-4);cursor:pointer;display:flex;align-items:center;padding:0}
.pw-eye:hover{color:var(--ink-2)}
.pw-eye i{width:16px;height:16px}

.pw-strength{margin-top:.4rem;display:none}
.pw-strength.show{display:block}
.pw-bars{display:flex;gap:3px;margin-bottom:3px}
.pw-bar{height:3px;flex:1;border-radius:2px;background:var(--border-2);transition:background .25s}
.pw-bar.weak{background:var(--red)}.pw-bar.fair{background:var(--amber)}.pw-bar.good{background:var(--green)}
.pw-strength-lbl{font-size:.68rem;color:var(--ink-4)}
.pw-strength-lbl.weak{color:var(--red)}.pw-strength-lbl.fair{color:var(--amber)}.pw-strength-lbl.good{color:var(--green)}

.match-hint{font-size:.72rem;margin-top:.3rem;display:none}
.match-hint.show{display:flex;align-items:center;gap:4px}
.match-hint.ok{color:var(--green)}.match-hint.no{color:var(--red)}
.match-hint i{width:12px;height:12px;flex-shrink:0}

.btn-submit{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:.82rem;background:var(--brand);color:#fff;border:none;border-radius:var(--r-lg);font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .18s var(--ease);box-shadow:var(--sh-brand);margin-top:1.25rem;margin-bottom:1rem}
.btn-submit:hover:not(:disabled){background:var(--brand-d);box-shadow:0 8px 28px rgba(67,56,202,.4);transform:translateY(-1px)}
.btn-submit:disabled{opacity:.65;cursor:not-allowed}
.btn-submit i{width:17px;height:17px}
.btn-submit .loader{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.btn-submit.loading span,.btn-submit.loading i{display:none}
.btn-submit.loading .loader{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Invalid token state */
.error-state{display:none;text-align:center}
.error-state.show{display:block}
.error-state .error-icon{width:52px;height:52px;background:rgba(239,68,68,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.error-state .error-icon i{width:24px;height:24px;color:var(--red)}
.error-state h2{font-size:1.1rem;font-weight:800;color:var(--ink);margin-bottom:.4rem}
.error-state p{font-size:.85rem;color:var(--ink-3);margin-bottom:1.5rem}

.form-state{}

.toast-container{position:fixed;bottom:1.25rem;right:1.25rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;max-width:340px;width:calc(100vw - 2.5rem)}
.toast{display:flex;align-items:center;gap:.65rem;padding:.8rem 1rem;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-lg);box-shadow:var(--sh-lg);font-size:.84rem;font-weight:500;color:var(--ink);animation:toastIn .25s var(--ease-out)}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--brand)}
.toast i{width:17px;height:17px;flex-shrink:0}
.toast.success i{color:var(--green)}.toast.error i{color:var(--red)}.toast.info i{color:var(--brand)}
@keyframes toastIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}

.card>*{opacity:0;transform:translateY(10px);animation:entryFade .45s var(--ease-out) both}
.card>*:nth-child(1){animation-delay:.05s}.card>*:nth-child(2){animation-delay:.1s}
.card>*:nth-child(3){animation-delay:.15s}.card>*:nth-child(4){animation-delay:.2s}
.card>*:nth-child(5){animation-delay:.25s}.card>*:nth-child(6){animation-delay:.3s}
@keyframes entryFade{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="card">
  <div class="card-logo">
    <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" alt="Logo">
    <span>SellerTrackr</span>
  </div>

  <!-- Error state (invalid/expired token) -->
  <div class="error-state" id="error-state">
    <div class="error-icon"><i data-lucide="link-2-off"></i></div>
    <h2>Link expired or invalid</h2>
    <p>Ye password reset link expire ho gaya hai ya invalid hai. Dobara request karein.</p>
    <a href="forgot-password.html" style="display:inline-flex;align-items:center;gap:6px;padding:.75rem 1.5rem;background:var(--brand);color:#fff;border-radius:var(--r-lg);font-weight:700;font-size:.875rem;text-decoration:none">
      <i data-lucide="refresh-cw" style="width:15px;height:15px"></i>
      Request New Link
    </a>
  </div>

  <!-- Form state -->
  <div class="form-state" id="form-state">
    <div class="card-icon"><i data-lucide="shield-check"></i></div>
    <h1>Set new password</h1>
    <p class="sub">Choose a strong password that you haven't used before.</p>

    <form id="reset-form" novalidate>
      <div class="field" id="f-password">
        <label for="password">New Password</label>
        <div class="field-pw">
          <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password">
          <button class="pw-eye" type="button" id="pw-toggle-1" aria-label="Toggle">
            <i data-lucide="eye"></i>
          </button>
        </div>
        <div class="pw-strength" id="pw-strength">
          <div class="pw-bars">
            <div class="pw-bar" id="bar1"></div><div class="pw-bar" id="bar2"></div>
            <div class="pw-bar" id="bar3"></div><div class="pw-bar" id="bar4"></div>
          </div>
          <div class="pw-strength-lbl" id="strength-lbl">Weak</div>
        </div>
        <div class="err-msg">Password kam se kam 8 characters hona chahiye</div>
      </div>

      <div class="field" id="f-confirm">
        <label for="confirm">Confirm Password</label>
        <div class="field-pw">
          <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password">
          <button class="pw-eye" type="button" id="pw-toggle-2" aria-label="Toggle">
            <i data-lucide="eye"></i>
          </button>
        </div>
        <div class="match-hint" id="match-hint"></div>
        <div class="err-msg">Passwords match nahi hote</div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span>Reset Password</span>
        <i data-lucide="check"></i>
        <div class="loader"></div>
      </button>
    </form>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script type="module">
import { supabase } from './assets/js/config.js';
import { resetPassword } from './assets/js/auth.js';

if (window.lucide) window.lucide.createIcons();

function toast(msg, type='info') {
  const icons={success:'check-circle',error:'x-circle',info:'info'};
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<i data-lucide="${icons[type]}"></i><span style="flex:1">${msg}</span>`;
  c.appendChild(el);
  if(window.lucide) window.lucide.createIcons();
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .25s';setTimeout(()=>el.remove(),300);},4000);
}

// Check if we have a valid session from the reset email link
async function checkResetToken() {
  const { data: { session } } = await supabase.auth.getSession();
  const hash = window.location.hash;

  // Supabase puts access_token in URL hash after clicking reset link
  if (!session && !hash.includes('access_token')) {
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('error-state').classList.add('show');
    if (window.lucide) window.lucide.createIcons();
  }
}
checkResetToken();

// Password strength
function getStrength(pw) {
  let s=0;
  if(pw.length>=8)s++;
  if(pw.length>=12)s++;
  if(/[A-Z]/.test(pw)&&/[0-9]/.test(pw))s++;
  if(/[^A-Za-z0-9]/.test(pw))s++;
  return s;
}
const pwInput = document.getElementById('password');
pwInput.addEventListener('input', () => {
  const val=pwInput.value;
  const str=document.getElementById('pw-strength');
  str.classList.toggle('show', val.length>0);
  if(!val.length)return;
  const score=getStrength(val);
  const cls=score<=1?'weak':score<=2?'fair':'good';
  const txt=score<=1?'Weak':score<=2?'Fair':'Strong';
  ['bar1','bar2','bar3','bar4'].forEach((id,i)=>{
    document.getElementById(id).className='pw-bar'+(i<Math.max(score,1)?' '+cls:'');
  });
  const lbl=document.getElementById('strength-lbl');
  lbl.textContent=txt;lbl.className=`pw-strength-lbl ${cls}`;
  checkMatch();
});

const confirmInput = document.getElementById('confirm');
confirmInput.addEventListener('input', checkMatch);

function checkMatch() {
  const pw=pwInput.value, cf=confirmInput.value;
  const hint=document.getElementById('match-hint');
  if(!cf){hint.classList.remove('show');return;}
  const match=pw===cf;
  hint.className=`match-hint show ${match?'ok':'no'}`;
  hint.innerHTML=match
    ?'<i data-lucide="check-circle" style="width:12px;height:12px"></i> Passwords match'
    :'<i data-lucide="x-circle"     style="width:12px;height:12px"></i> Passwords don\'t match';
  if(window.lucide) window.lucide.createIcons();
}

// Password toggles
function makeToggle(btnId, inputId) {
  const btn=document.getElementById(btnId);
  const inp=document.getElementById(inputId);
  btn.addEventListener('click',()=>{
    const show=inp.type==='password';
    inp.type=show?'text':'password';
    btn.innerHTML=show
      ?'<i data-lucide="eye-off" style="width:16px;height:16px"></i>'
      :'<i data-lucide="eye"     style="width:16px;height:16px"></i>';
    if(window.lucide) window.lucide.createIcons();
  });
}
makeToggle('pw-toggle-1','password');
makeToggle('pw-toggle-2','confirm');

// Submit
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw=document.getElementById('password').value;
  const cf=document.getElementById('confirm').value;
  let ok=true;
  const fpw=document.getElementById('f-password');
  const fcf=document.getElementById('f-confirm');

  if(pw.length<8){fpw.classList.add('has-err');ok=false;}else{fpw.classList.remove('has-err');}
  if(pw!==cf||!cf){fcf.classList.add('has-err');ok=false;}else{fcf.classList.remove('has-err');}

  if(!ok){toast('Passwords check karein','warning');return;}

  const btn=document.getElementById('submit-btn');
  btn.classList.add('loading');btn.disabled=true;
  await resetPassword(pw);
  btn.classList.remove('loading');btn.disabled=false;
});
</script>
</body>
</html>
