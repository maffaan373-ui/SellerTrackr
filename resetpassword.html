<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset password — fluxwith</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:Inter,sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px}
*{-webkit-tap-highlight-color:transparent}
.card{width:100%;max-width:360px}
.logo{display:inline-flex;align-items:center;gap:0;text-decoration:none;margin-bottom:36px}
.logo svg{margin-right:-1px;display:block}
.logo span{font-size:17px;font-weight:500;color:#111;letter-spacing:-0.4px}
.title{font-family:"Instrument Serif",Georgia,serif;font-style:italic;font-size:26px;font-weight:400;color:#111;margin-bottom:6px;letter-spacing:-0.3px}
.sub{font-size:14px;color:#6b6b6b;margin-bottom:26px;line-height:1.5}
.banner{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.banner.error{background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7;display:block}
.banner.ok{background:#f0fff4;color:#276749;border:1px solid #c6f6d5;display:block}
.form{display:flex;flex-direction:column;gap:13px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:13px;font-weight:500;color:#111}
.field input{width:100%;padding:13px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;color:#111;background:#fff;outline:none;transition:border-color .15s;-webkit-appearance:none;font-family:Inter,sans-serif}
.field input::placeholder{color:#bbb}
.field input:focus{border-color:#111}
.field input.err{border-color:#e53e3e}
.emsg{font-size:12px;color:#e53e3e;display:none;margin-top:2px}
.emsg.show{display:block}
.btn{width:100%;padding:14px;border-radius:50px;font-size:15px;font-weight:600;color:#fff;background:#111;border:none;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;font-family:Inter,sans-serif}
.btn:hover{opacity:.82}
.btn:disabled{opacity:.4;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .spinner{display:block}
.loading .btn-text{display:none}
</style></head><body>
<div class="card">
  <a href="index.html" class="logo">
    <svg width="26" height="19" viewBox="0 0 70 50" xmlns="http://www.w3.org/2000/svg"><text x="0" y="44" font-family="Georgia,serif" font-size="52" font-weight="900" font-style="italic" fill="#111" letter-spacing="-4">fl.</text></svg>
    <span>fluxwith</span>
  </a>
  <h1 class="title">Set new password</h1>
  <p class="sub">Choose a strong password for your account.</p>
  <div class="banner" id="banner"></div>
  <form class="form" id="form" novalidate>
    <div class="field">
      <label>New password</label>
      <input type="password" id="pass" placeholder="Min. 8 characters" autocomplete="new-password"/>
      <span class="emsg" id="pem">Password must be at least 8 characters.</span>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="conf" placeholder="Re-enter password" autocomplete="new-password"/>
      <span class="emsg" id="cem">Passwords do not match.</span>
    </div>
    <button type="submit" class="btn" id="btn">
      <span class="btn-text">Update password</span><span class="spinner"></span>
    </button>
  </form>
</div>
<script>
const SURL='https://dpxuopdoumomasmahnyo.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRweHVvcGRvdW1vbWFzbWFobnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTE5NjUsImV4cCI6MjA4Nzg4Nzk2NX0.MxsfAZqhjp2M-yi8LVgOpTJEhSLujYTGJdivSM_VpcQ';
const sb=supabase.createClient(SURL,SKEY);

// Handle Supabase auth token from URL hash
sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='PASSWORD_RECOVERY'){
    // User is in password recovery mode — ready to update
    console.log('Password recovery mode active');
  }
});

document.getElementById('form').addEventListener('submit',async e=>{
  e.preventDefault();
  let ok=true;
  const banner=document.getElementById('banner');
  const btn=document.getElementById('btn');
  banner.className='banner';
  const pv=document.getElementById('pass').value;
  const cv=document.getElementById('conf').value;
  const pok=pv.length>=8;
  document.getElementById('pem').classList.toggle('show',!pok);
  document.getElementById('pass').classList.toggle('err',!pok);
  if(!pok)ok=false;
  const cok=cv===pv&&pv.length>0;
  document.getElementById('cem').classList.toggle('show',!cok);
  document.getElementById('conf').classList.toggle('err',!cok);
  if(!cok)ok=false;
  if(!ok)return;
  btn.classList.add('loading');btn.disabled=true;
  const{error}=await sb.auth.updateUser({password:pv});
  btn.classList.remove('loading');btn.disabled=false;
  if(error){banner.textContent=error.message;banner.className='banner error';return;}
  banner.textContent='Password updated! Redirecting to sign in...';
  banner.className='banner ok';
  setTimeout(()=>window.location.href='login.html',2000);
});
</script>
</body></html>
