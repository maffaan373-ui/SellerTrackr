<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Forgot password — fluxwith</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:Inter,sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px}
*{-webkit-tap-highlight-color:transparent}
.card{width:100%;max-width:360px}
.logo{display:inline-flex;align-items:center;gap:0;text-decoration:none;margin-bottom:36px}
.logo svg{margin-right:-1px;display:block}
.logo span{font-size:17px;font-weight:500;color:#111;letter-spacing:-0.4px}
.title{font-family:"Instrument Serif",Georgia,serif;font-style:italic;font-size:26px;font-weight:400;color:#111;margin-bottom:6px;letter-spacing:-0.3px}
.sub{font-size:14px;color:#6b6b6b;margin-bottom:26px;line-height:1.5}
.banner{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.banner.error{background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7;display:block}
.banner.ok{background:#f0fff4;color:#276749;border:1px solid #c6f6d5;display:block}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:13px;font-weight:500;color:#111}
.field input{width:100%;padding:13px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:15px;color:#111;background:#fff;outline:none;transition:border-color .15s;-webkit-appearance:none;font-family:Inter,sans-serif}
.field input::placeholder{color:#bbb}
.field input:focus{border-color:#111}
.btn{width:100%;padding:14px;border-radius:50px;font-size:15px;font-weight:600;color:#fff;background:#111;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;font-family:Inter,sans-serif}
.btn:hover{opacity:.82}
.btn:disabled{opacity:.4;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .spinner{display:block}
.loading .btn-text{display:none}
.note{text-align:center;margin-top:20px;font-size:13px;color:#6b6b6b}
.note a{color:#111;font-weight:500;text-decoration:underline}
</style></head><body>
<div class="card">
  <a href="index.html" class="logo">
    <svg width="26" height="19" viewBox="0 0 70 50" xmlns="http://www.w3.org/2000/svg"><text x="0" y="44" font-family="Georgia,serif" font-size="52" font-weight="900" font-style="italic" fill="#111" letter-spacing="-4">fl.</text></svg>
    <span>fluxwith</span>
  </a>
  <h1 class="title">Forgot password?</h1>
  <p class="sub">Enter your email and we'll send you a reset link.</p>
  <div class="banner" id="banner"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <button class="btn" id="btn">
    <span class="btn-text">Send reset link</span><span class="spinner"></span>
  </button>
  <p class="note"><a href="login.html">← Back to sign in</a></p>
</div>
<script>
const SURL='https://dpxuopdoumomasmahnyo.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRweHVvcGRvdW1vbWFzbWFobnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTE5NjUsImV4cCI6MjA4Nzg4Nzk2NX0.MxsfAZqhjp2M-yi8LVgOpTJEhSLujYTGJdivSM_VpcQ';
const sb=supabase.createClient(SURL,SKEY);

document.getElementById('btn').addEventListener('click',async()=>{
  const banner=document.getElementById('banner');
  const btn=document.getElementById('btn');
  const ev=document.getElementById('email').value.trim();
  banner.className='banner';
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(ev)){banner.textContent='Enter a valid email address.';banner.className='banner error';return;}
  btn.classList.add('loading');btn.disabled=true;
  const{error}=await sb.auth.resetPasswordForEmail(ev,{redirectTo:window.location.origin+'/reset-password.html'});
  btn.classList.remove('loading');btn.disabled=false;
  if(error){banner.textContent=error.message;banner.className='banner error';return;}
  banner.textContent='Reset link sent! Check your email inbox.';banner.className='banner ok';
});
</script>
</body></html>
