<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SellerTrackr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" alt="Logo" class="w-12 h-12 rounded-xl">
                <span class="font-syne text-2xl font-bold text-slate-900">SellerTrackr</span>
            </a>
            <h1 class="text-3xl font-syne font-bold text-slate-900">Welcome Back</h1>
            <p class="text-slate-500">Please enter your details to sign in.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
                    <input type="email" required placeholder="name@company.com" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500">
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-semibold text-slate-700">Password</label>
                        <a href="#" class="text-sm text-emerald-600 font-medium">Forgot?</a>
                    </div>
                    <input type="password" required placeholder="••••••••" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500">
                </div>
                
                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="remember" class="w-4 h-4 accent-emerald-500">
                    <label for="remember" class="text-sm text-slate-500">Remember me for 30 days</label>
                </div>

                <button type="submit" class="w-full btn-primary py-3">Sign In</button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                <div class="relative flex justify-center text-sm uppercase"><span class="bg-white px-2 text-slate-400">Or</span></div>
            </div>

            <button class="w-full flex items-center justify-center gap-3 border border-slate-200 p-3 rounded-lg font-medium hover:bg-slate-50 transition-colors">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google">
                Continue with Google
            </button>
        </div>

        <p class="mt-8 text-center text-slate-600">
            Don't have an account? <a href="signup.html" class="text-emerald-600 font-bold">Sign up for free</a>
        </p>
    </div>
    <script type="module" src="assets/js/ui.js"></script>
</body>
</html>
