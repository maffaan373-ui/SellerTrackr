<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SellerTrackr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-3 mb-8">
                <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" 
                     alt="Logo" 
                     class="w-14 h-14 rounded-2xl shadow-lg">
                <span class="font-display text-3xl font-bold text-white">SellerTrackr</span>
            </a>
            <h1 class="text-4xl font-display font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-white/60 text-lg">Enter your credentials</p>
        </div>

        <div class="glass-card p-10">
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-white/90 mb-2">Email</label>
                    <input id="email" type="email" required placeholder="name@company.com" 
                           class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white">
                </div>
                
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-bold text-white/90">Password</label>
                        <a href="#" class="text-sm text-accent font-medium hover:underline">Forgot?</a>
                    </div>
                    <input id="password" type="password" required placeholder="••••••••" 
                           class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white">
                </div>
                
                <div class="flex items-center gap-3 py-2">
                    <input type="checkbox" id="remember" class="w-5 h-5 accent-accent rounded">
                    <label for="remember" class="text-sm text-white/70">Remember me</label>
                </div>

                <button type="submit" id="submit-btn" class="w-full btn-primary py-4 text-lg">
                    Sign In
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 text-white/40 bg-primary-light uppercase text-xs font-bold">Or</span>
                </div>
            </div>

            <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 p-4 bg-white/5 border border-white/10 rounded-xl font-semibold text-white hover:bg-white/10 transition-all">
                <img src="https://www.google.com/favicon.ico" class="w-6 h-6" alt="Google">
                Continue with Google
            </button>
        </div>

        <p class="mt-8 text-center text-white/60">
            Don't have account? 
            <a href="signup.html" class="text-accent font-bold hover:underline">Sign up</a>
        </p>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module">
        import { loginUser, loginWithGoogle } from './assets/js/auth.js';
        import { showToast } from './assets/js/ui.js';
        
        // Initialize Lucide
        if (window.lucide) window.lucide.createIcons();
        
        // Form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Logging in...';
            
            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                console.log('Login attempt:', { email });
                
                await loginUser(email, password);
            } catch (error) {
                console.error('Login error:', error);
                showToast('Error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In <i data-lucide="arrow-right" class="w-5 h-5"></i>';
                if (window.lucide) window.lucide.createIcons();
            }
        });

        // Google login
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            await loginWithGoogle();
        });
    </script>
</body>
</html>
