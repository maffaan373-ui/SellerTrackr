<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SellerTrackr</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <a href="index.html" class="auth-logo">
            <img src="https://r2-bucket.flowith.net/f/738a58f66308b7d7/sellertrackr_logo_design_index_1%401024x1024.jpeg" alt="Logo">
            <span>SellerTrackr</span>
        </a>
        <h1 class="auth-heading">Welcome back</h1>
        <p class="auth-sub">Sign in to your account</p>

        <div class="auth-card">
            <button id="google-login-btn" class="btn-google">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Continue with Google
            </button>

            <div class="auth-divider">or</div>

            <form id="login-form" style="display:flex;flex-direction:column;gap:var(--space-4)">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" type="email" required placeholder="name@company.com" class="form-input">
                </div>
                <div class="form-group">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <label class="form-label" for="password">Password</label>
                        <a href="#" style="font-size:0.78rem;color:var(--brand-700);font-weight:600">Forgot?</a>
                    </div>
                    <input id="password" type="password" required placeholder="••••••••" class="form-input">
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <input type="checkbox" id="remember" style="width:16px;height:16px;accent-color:var(--brand-700)">
                    <label for="remember" style="font-size:0.83rem;color:var(--text-secondary)">Remember me</label>
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary btn-lg btn-full" style="margin-top:var(--space-1)">
                    Sign In
                    <i data-lucide="arrow-right" style="width:18px;height:18px"></i>
                </button>
            </form>
        </div>

        <p class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up free</a>
        </p>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script type="module">
    import { loginUser, loginWithGoogle } from './assets/js/auth.js';
    import { showToast } from './assets/js/ui.js';
    if (window.lucide) window.lucide.createIcons();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Signing in…';
        try {
            await loginUser(
                document.getElementById('email').value,
                document.getElementById('password').value
            );
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Sign In <i data-lucide="arrow-right" style="width:18px;height:18px"></i>';
            if (window.lucide) window.lucide.createIcons();
        }
    });

    document.getElementById('google-login-btn').addEventListener('click', () => loginWithGoogle());
</script>
</body>
</html>
