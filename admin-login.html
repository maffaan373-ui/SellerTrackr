<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SellerTrackr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-accent/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-check" class="w-8 h-8 text-accent"></i>
            </div>
            <h1 class="text-3xl font-display font-bold text-white mb-2">Admin Access</h1>
            <p class="text-white/60">Secure admin portal</p>
        </div>

        <div class="glass-card p-10">
            <form id="admin-login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-white/90 mb-2">Admin Email</label>
                    <input id="admin-email" type="email" required 
                           placeholder="admin@sellertrackr.com" 
                           class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-white/90 mb-2">Password</label>
                    <input id="admin-password" type="password" required 
                           placeholder="••••••••" 
                           class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white">
                </div>

                <button type="submit" class="w-full btn-primary py-4">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                    Access Admin Panel
                </button>
            </form>
        </div>

        <p class="mt-8 text-center text-white/60 text-sm">
            <a href="index.html" class="text-accent hover:underline">← Back to home</a>
        </p>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script type="module">
        import { loginUser } from './assets/js/auth.js';
        import { showToast } from './assets/js/ui.js';
        import { supabase } from './assets/js/config.js';
        
        if (window.lucide) window.lucide.createIcons();
        
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            
            try {
                // Login karo
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                // Check if admin
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('is_admin')
                    .eq('id', data.user.id)
                    .single();
                
                if (profile && profile.is_admin) {
                    showToast('Admin access granted!', 'success');
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    throw new Error('Admin access denied!');
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        });
    </script>
</body>
</html>
