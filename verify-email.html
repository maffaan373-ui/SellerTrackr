<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | SellerTrackr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full text-center">
        <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="mail" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-syne font-bold text-slate-900 mb-2">Check your email</h1>
            <p class="text-slate-500 mb-8">We've sent a 6-digit verification code to <span class="text-slate-900 font-semibold">user@example.com</span></p>
            
            <form id="otp-form" class="space-y-8">
                <div class="flex justify-between gap-2">
                    <input type="text" maxlength="1" class="otp-input" data-index="1" autofocus>
                    <input type="text" maxlength="1" class="otp-input" data-index="2">
                    <input type="text" maxlength="1" class="otp-input" data-index="3">
                    <input type="text" maxlength="1" class="otp-input" data-index="4">
                    <input type="text" maxlength="1" class="otp-input" data-index="5">
                    <input type="text" maxlength="1" class="otp-input" data-index="6">
                </div>
                
                <div>
                    <p class="text-sm text-slate-500 mb-1">Code expires in</p>
                    <p id="timer" class="text-slate-900 font-bold">10:00</p>
                </div>

                <button type="submit" class="w-full btn-primary py-3">Verify Code</button>
            </form>

            <p class="mt-8 text-sm text-slate-500">
                Didn't receive the code? 
                <button id="resend-btn" class="text-emerald-600 font-bold disabled:opacity-50" disabled>Resend (60s)</button>
            </p>
        </div>
        <a href="signup.html" class="inline-flex items-center gap-2 mt-8 text-slate-500 hover:text-slate-900 font-medium">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Signup
        </a>
    </div>

    <script type="module">
        import { initUI } from './assets/js/ui.js';
        initUI();

        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, idx) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && idx < inputs.length - 1) {
                    inputs[idx + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                    inputs[idx - 1].focus();
                }
            });
        });

        // Simple Countdown Logic
        let timeLeft = 600; // 10 mins
        const timerEl = document.getElementById('timer');
        setInterval(() => {
            if (timeLeft <= 0) return;
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    </script>
</body>
</html>
